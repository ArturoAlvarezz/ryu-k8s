---
apiVersion: v1
kind: Namespace
metadata:
  name: sdn-controller
---
# ==========================
# Redis Components
# ==========================
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sdn-controller
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sdn-controller
spec:
  replicas: 1 # For production, consider using a Redis cluster or Sentinel
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
# ==========================
# Distributed Ryu Controller Components
# ==========================
apiVersion: v1
kind: Service
metadata:
  name: ryu-openflow
  namespace: sdn-controller
spec:
  type: LoadBalancer # Exposes the service externally. For K3s, this will use Klipper. NodePort is also a valid fallback.
  ports:
  - name: openflow-6653
    port: 6653
    targetPort: 6653
    protocol: TCP
  - name: openflow-6633
    port: 6633
    targetPort: 6633
    protocol: TCP
  selector:
    app: ryu
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ryu
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ryu
  template:
    metadata:
      labels:
        app: ryu
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: ryu
        image: arturoalvarez/ryu-controller:latest
        command: ["ryu-manager", "--observe-links", "app.py"]
        env:
        - name: REDIS_HOST
          value: "redis.sdn-controller.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"

---
# ==========================
# Auto-Configurador de OVS Host (DaemonSet) - Compatible Kernel Host
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ovs-sdn-initializer
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ovs-init
  template:
    metadata:
      labels:
        app: ovs-init
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: ovs-configurator
        image: ubuntu:22.04  # Usamos la misma base nativa del nodo anfitrión
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command:
        - /bin/bash
        - -c
        - |
          echo "Instalando Open vSwitch..."
          apt-get update > /dev/null
          apt-get install -y openvswitch-switch kmod iproute2 redis-tools > /dev/null
          
          echo "Cargando módulo del kernel..."
          modprobe openvswitch || true
          
          echo "Iniciando servicio OVS..."
          service openvswitch-switch start
          sleep 2
          
          echo "Limpiando estado anterior para evitar fantasmas..."
          ovs-vsctl --if-exists del-br br-sdn
          
          # Generar el DPID permanente usando la MAC principal de la máquina (br0) tal como los switches físicos
          MAC_ADDR=$(ip link show br0 | awk '/ether/ {print $2}' | tr -d ':')
          DPID="0000${MAC_ADDR}"
          
          echo "Creando br-sdn con DPID físico estático: $DPID..."
          ovs-vsctl --may-exist add-br br-sdn
          ovs-vsctl set bridge br-sdn other-config:datapath-id=$DPID
          
          echo "Conectando al controlador Ryu..."
          ovs-vsctl set bridge br-sdn protocols=OpenFlow13
          ovs-vsctl set-controller br-sdn tcp:127.0.0.1:6653
          
          echo "Registrando nodo en base de datos global (Redis)..."
          MY_IP=$(ip route get 1.1.1.1 2>/dev/null | awk '{print $7; exit}' || ip addr show br0 | awk '/inet / {print $2}' | cut -d/ -f1 | head -1)
          redis-cli -h redis.sdn-controller.svc.cluster.local HSET topology:node_names $DPID $NODE_NAME || true
          redis-cli -h redis.sdn-controller.svc.cluster.local HSET topology:node_ips $DPID $MY_IP || true
          echo "Nodo registrado: $NODE_NAME ($MY_IP)"

          echo "Activando RSTP (Anti-Bucles)..."
          ovs-vsctl set bridge br-sdn rstp_enable=true

          echo "Esperando 15 segundos para que todos los nodos se registren en Redis..."
          sleep 15

          echo "Creando tuneles VXLAN hacia vecinos conocidos en Redis..."
          while true; do
            # Leer todos los nodos registrados en Redis
            ALL_IPS=$(redis-cli -h redis.sdn-controller.svc.cluster.local HGETALL topology:node_ips 2>/dev/null)
            echo "$ALL_IPS" | paste - - | while read dpid remote_ip; do
              # Saltar IPs vacias o la nuestra propia (comparacion exacta de IP completa)
              if [ -z "$remote_ip" ] || [ "$remote_ip" = "$MY_IP" ]; then continue; fi

              # Nombre de puerto unico: vxlan + los 4 octetos sin puntos
              PORT_NAME="vx$(echo $remote_ip | tr -d '.')"

              # Crear el tunel VXLAN si no existe aun
              if ! ovs-vsctl list-ports br-sdn | grep -q "^${PORT_NAME}$"; then
                echo "Creando tunel VXLAN a $remote_ip (puerto $PORT_NAME)..."
                ovs-vsctl --may-exist add-port br-sdn $PORT_NAME \
                  -- set interface $PORT_NAME type=vxlan \
                     options:remote_ip=$remote_ip \
                     options:key=100 \
                     options:dst_port=4789 \
                  > /dev/null 2>&1 || true
              fi
            done

            # Añadir Guests en ens6+ automaticamente
            for intf in $(ls /sys/class/net | grep -E "^ens[6-9]$|^ens[1-9][0-9]$"); do
              if ! ovs-vsctl list-ports br-sdn | grep -q "^$intf$"; then
                echo "Auto-detectado nuevo Guest en $intf. Añadiendo a la red SDN..."
                ip link set $intf up > /dev/null 2>&1 || true
                ovs-vsctl --may-exist add-port br-sdn $intf > /dev/null 2>&1 || true
              fi
            done
            sleep 10
          done
        volumeMounts:
        - name: libmodules
          mountPath: /lib/modules
          readOnly: true
        - name: run-openvswitch
          mountPath: /var/run/openvswitch
      volumes:
      - name: libmodules
        hostPath:
          path: /lib/modules
      - name: run-openvswitch
        hostPath:
          path: /var/run/openvswitch
          type: DirectoryOrCreate

---
# ==========================
# Web Dashboard de Topología (Backend + Frontend)
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ryu-topology
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ryu-topology
  template:
    metadata:
      labels:
        app: ryu-topology
    spec:
      containers:
      - name: dashboard
        image: arturoalvarez/ryu-topology:latest
        imagePullPolicy: Always
        env:
        - name: REDIS_HOST
          value: "redis.sdn-controller.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: ryu-topology
  namespace: sdn-controller
  labels:
    app: ryu-topology
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 5000
    protocol: TCP
  selector:
    app: ryu-topology

---
# ==========================
# Servidor DHCP Distribuido sobre Red VXLAN L2 
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sdn-dhcp-server
  namespace: sdn-controller
  labels:
    app: sdn-dhcp
spec:
  selector:
    matchLabels:
      app: sdn-dhcp
  template:
    metadata:
      labels:
        app: sdn-dhcp
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: dhcp
        image: arturoalvarez/ryu-dhcp:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
        env:
        - name: REDIS_HOST
          value: "redis.sdn-controller.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
