apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: sdn-controller
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      access: proxy
      url: http://prometheus.sdn-controller.svc.cluster.local:9090
      isDefault: true
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki.sdn-controller.svc.cluster.local:3100
  dashboards.yml: |
    apiVersion: 1
    providers:
    - name: SDN
      orgId: 1
      folder: SDN
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: sdn-controller
data:
  sdn-observability.json: |
    {
      "uid": "sdn-observability",
      "title": "SDN Observabilidad",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "2s",
      "timezone": "browser",
      "templating": {
        "list": [
          {
            "name": "src_guest",
            "label": "Guest origen",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "query_result(max by (id) (ryu_topology_node_info{type=\"guest\"}))",
            "regex": "/id=\"([^\"]+)\"/",
            "refresh": 1,
            "sort": 1,
            "includeAll": false,
            "multi": false
          },
          {
            "name": "dst_guest",
            "label": "Guest destino",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "query_result(max by (id) (ryu_topology_node_info{type=\"guest\",id!=\"$src_guest\"}))",
            "regex": "/id=\"([^\"]+)\"/",
            "refresh": 1,
            "sort": 1,
            "includeAll": false,
            "multi": false
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "type": "nodeGraph",
          "title": "Mapa SDN y camino entre guests",
          "gridPos": {"x": 0, "y": 0, "w": 24, "h": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "nodes",
              "expr": "max by (id, title, subtitle, mainstat, color, icon, type) (ryu_topology_node_info)",
              "format": "table",
              "instant": true
            },
            {
              "refId": "edges",
              "expr": "max by (id, source, target, mainstat, secondarystat, color, strokeDasharray, thickness, type) (((((ryu_topology_edge_info{link!=\"\",type!=\"br0_stp\"} unless on (link) ryu_topology_edge_info{link!=\"\",type=\"br0_stp_blocked\"}) or ryu_topology_edge_info{link!=\"\",type=\"br0_stp_blocked\"}) unless on (link) ryu_trace_path_edge_info{src_guest=\"$src_guest\",dst_guest=\"$dst_guest\",link!=\"\"}) or ryu_trace_path_edge_info{src_guest=\"$src_guest\",dst_guest=\"$dst_guest\",link!=\"\"}))",
              "format": "table",
              "instant": true
            }
          ],
          "options": {
            "layout": "force",
            "zoomMode": "greedy",
            "nodes": {
              "mainStatUnit": "short",
              "secondaryStatUnit": "short"
            },
            "edges": {
              "mainStatUnit": "short",
              "secondaryStatUnit": "short"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Packet-In por segundo",
          "gridPos": {"x": 0, "y": 18, "w": 12, "h": 8},
          "targets": [{"expr": "sum by (dpid) (rate(ryu_packet_in_total[1m]))", "legendFormat": "switch {{dpid}}"}]
        },
        {
          "type": "stat",
          "title": "Nodos activos",
          "gridPos": {"x": 12, "y": 18, "w": 6, "h": 4},
          "targets": [{"expr": "max(ryu_active_nodes)", "legendFormat": "nodos"}]
        },
        {
          "type": "stat",
          "title": "Switches activos",
          "gridPos": {"x": 18, "y": 18, "w": 6, "h": 4},
          "targets": [{"expr": "max(ryu_active_switches)", "legendFormat": "switches"}]
        },
        {
          "type": "bargauge",
          "title": "Flujos instalados por switch",
          "gridPos": {"x": 12, "y": 22, "w": 12, "h": 4},
          "targets": [{"expr": "max by (dpid) (ryu_installed_flows)", "legendFormat": "{{dpid}}"}]
        },
        {
          "type": "timeseries",
          "title": "Nodos con mas trafico",
          "gridPos": {"x": 0, "y": 26, "w": 12, "h": 8},
          "targets": [{"expr": "topk(5, sum by (node) (rate(node_network_receive_bytes_total{device!~\"lo|cni.*|flannel.*|veth.*\"}[1m]) + rate(node_network_transmit_bytes_total{device!~\"lo|cni.*|flannel.*|veth.*\"}[1m])))", "legendFormat": "{{node}}"}]
        },
        {
          "type": "timeseries",
          "title": "CPU por nodo",
          "gridPos": {"x": 12, "y": 26, "w": 12, "h": 8},
          "targets": [{"expr": "100 - (avg by (node) (rate(node_cpu_seconds_total{mode=\"idle\"}[1m])) * 100)", "legendFormat": "{{node}}"}]
        },
        {
          "type": "timeseries",
          "title": "Memoria usada por nodo",
          "gridPos": {"x": 0, "y": 34, "w": 12, "h": 8},
          "targets": [{"expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100", "legendFormat": "{{node}}"}]
        },
        {
          "type": "timeseries",
          "title": "Trafico SDN por puerto OpenFlow",
          "gridPos": {"x": 12, "y": 34, "w": 12, "h": 8},
          "targets": [{"expr": "sum by (dpid, port_name) (rate(ryu_port_rx_bytes_total[1m]) + rate(ryu_port_tx_bytes_total[1m]))", "legendFormat": "{{dpid}} {{port_name}}"}]
        },
        {
          "type": "logs",
          "title": "Logs Ryu",
          "gridPos": {"x": 0, "y": 42, "w": 24, "h": 10},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"sdn-controller\", app=\"ryu\"}",
              "queryType": "range"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sdn-controller
  labels:
    app: grafana
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: grafana
              topologyKey: kubernetes.io/hostname
      containers:
      - name: grafana
        image: grafana/grafana:11.1.4
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: Viewer
        volumeMounts:
        - name: provisioning
          mountPath: /etc/grafana/provisioning/datasources/datasource.yml
          subPath: datasource.yml
        - name: provisioning
          mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
          subPath: dashboards.yml
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: provisioning
        configMap:
          name: grafana-provisioning
      - name: dashboards
        configMap:
          name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sdn-controller
  labels:
    app: grafana
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  selector:
    app: grafana
