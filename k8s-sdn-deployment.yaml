---
apiVersion: v1
kind: Namespace
metadata:
  name: sdn-controller
---
# ==========================
# Redis Components
# ==========================
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: sdn-controller
spec:
  clusterIP: None
  ports:
  - name: redis
    port: 6379
  - name: sentinel
    port: 26379
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: sdn-controller
spec:
  ports:
  - name: sentinel
    port: 26379
    targetPort: 26379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: sdn-controller
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: redis
            topologyKey: kubernetes.io/hostname
      initContainers:
      - name: setup-ha
        image: redis:7-alpine
        command:
        - sh
        - -c
        - |
          # Solo crear configuración si el Pod es nuevo (volumen nuevo)
          if [ ! -f /data/sentinel.conf ]; then
            echo "bind 0.0.0.0" > /data/redis.conf
            if [ "$HOSTNAME" != "redis-0" ]; then
              echo "replicaof redis-0.redis-headless.sdn-controller.svc.cluster.local 6379" >> /data/redis.conf
            fi
            
            echo "bind 0.0.0.0" > /data/sentinel.conf
            echo "sentinel monitor mymaster redis-0.redis-headless.sdn-controller.svc.cluster.local 6379 2" >> /data/sentinel.conf
            echo "sentinel down-after-milliseconds mymaster 2000" >> /data/sentinel.conf
            echo "sentinel failover-timeout mymaster 5000" >> /data/sentinel.conf
            echo "sentinel parallel-syncs mymaster 1" >> /data/sentinel.conf
            echo "sentinel resolve-hostnames yes" >> /data/sentinel.conf
            echo "sentinel announce-hostnames yes" >> /data/sentinel.conf
            chmod 666 /data/sentinel.conf
          fi
        volumeMounts:
        - name: data
          mountPath: /data
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server", "/data/redis.conf"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: data
          mountPath: /data
      - name: sentinel
        image: redis:7-alpine
        command: ["redis-server", "/data/sentinel.conf", "--sentinel"]
        ports:
        - containerPort: 26379
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
---
# ==========================
# Distributed Ryu Controller Components
# ==========================
apiVersion: v1
kind: Service
metadata:
  name: ryu-openflow
  namespace: sdn-controller
spec:
  type: LoadBalancer # Exposes the service externally. For K3s, this will use Klipper. NodePort is also a valid fallback.
  ports:
  - name: openflow-6653
    port: 6653
    targetPort: 6653
    protocol: TCP
  - name: openflow-6633
    port: 6633
    targetPort: 6633
    protocol: TCP
  selector:
    app: ryu
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ryu
  namespace: sdn-controller
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
  selector:
    matchLabels:
      app: ryu
  template:
    metadata:
      labels:
        app: ryu
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # FIX: 60s grace period para que Ryu cierre conexiones OpenFlow con OVS limpiamente
      terminationGracePeriodSeconds: 60
      containers:
      - name: ryu
        image: arturoalvarez/ryu-controller:latest
        # FIX: IfNotPresent evita intentos de pull fallidos en lab GNS3 aislado sin internet
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          until [ -e /sys/class/net/br0 ] && [ -e /sys/class/net/br-sdn ]; do
            echo "Esperando br0 y br-sdn antes de iniciar Ryu..."
            sleep 3
          done
          exec ryu-manager --observe-links app.py
        env:
        - name: REDIS_SENTINEL_HOST
          value: "redis-sentinel.sdn-controller.svc.cluster.local"
        - name: REDIS_SENTINEL_PORT
          value: "26379"
        - name: METRICS_PORT
          value: "8000"
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
        readinessProbe:
          tcpSocket:
            port: 6653
          initialDelaySeconds: 5
          periodSeconds: 5
          # FIX: 100s de tolerancia para reconvergencia VXLAN tras reconexión de nodos
          failureThreshold: 20
        startupProbe:
          tcpSocket:
            port: 6653
          periodSeconds: 5
          failureThreshold: 60   # 300s máximo para startup — sin cambio
        livenessProbe:
          tcpSocket:
            port: 6653
          # FIX: period 30s + delay 30s + 6 fallos = 210s de tolerancia (antes: 60s)
          # Evita SIGKILL (Exit 137) durante reconvergencias VXLAN transitorias
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 6
      volumes:
      - name: code-volume
        configMap:
          name: ryu-code

---
# ==========================
# Auto-Configurador de OVS Host (DaemonSet) - Compatible Kernel Host
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ovs-sdn-initializer
  namespace: sdn-controller
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
  selector:
    matchLabels:
      app: ovs-init
  template:
    metadata:
      labels:
        app: ovs-init
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: ovs-configurator
        image: ubuntu:22.04  # Usamos la misma base nativa del nodo anfitrión
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command:
        - /bin/bash
        - -c
        - |
          echo "Instalando dependencias y demonios de red nativa L2..."
          until apt-get update > /dev/null && apt-get install -y openvswitch-switch kmod iproute2 iputils-ping redis-tools lldpd jq > /dev/null; do
            echo "apt no disponible todavia; reintentando dependencias OVS..."
            sleep 5
          done

          MASTER_NODE_IP="${MASTER_NODE_IP:-192.168.122.100}"

          get_br0_ip() {
            ip -4 addr show br0 2>/dev/null | awk '/inet / {print $2}' | cut -d/ -f1 | head -1
          }

          wait_for_management_plane() {
            while true; do
              MY_IP=$(get_br0_ip)
              if [ -z "$MY_IP" ]; then
                echo "br0 aun no tiene IPv4 de gestion; esperando..."
                sleep 3
                continue
              fi

              if ! ip link show br0 2>/dev/null | grep -q "state UP"; then
                echo "br0 existe pero no esta UP; intentando levantarlo..."
                ip link set br0 up 2>/dev/null || true
                sleep 3
                continue
              fi

              if [ "$MY_IP" != "$MASTER_NODE_IP" ] && ! ping -c1 -W1 "$MASTER_NODE_IP" > /dev/null 2>&1; then
                echo "Sin conectividad L3 hacia master $MASTER_NODE_IP desde $MY_IP; esperando red GNS3..."
                sleep 3
                continue
              fi

              if ! redis-cli -h redis-sentinel.sdn-controller.svc.cluster.local -p 26379 PING > /dev/null 2>&1; then
                echo "Redis Sentinel aun no esta alcanzable desde $MY_IP; esperando..."
                sleep 3
                continue
              fi

              echo "Plano de gestion listo en $MY_IP."
              return 0
            done
          }

          get_redis_master() {
            redis-cli -h redis-sentinel.sdn-controller.svc.cluster.local -p 26379 sentinel get-master-addr-by-name mymaster 2>/dev/null | head -n 1
          }

          wait_for_management_plane
          
          echo "Cargando módulo del kernel..."
          modprobe openvswitch || true
          
          echo "Iniciando servicio OVS y LLDPD..."
          service openvswitch-switch start
          mkdir -p /run/lldpd
          lldpd -d &
          sleep 2
          
          echo "Limpiando estado anterior para evitar fantasmas..."
          ovs-vsctl --if-exists del-br br-sdn
          
          # Generar el DPID permanente usando la MAC principal de la máquina (br0) tal como los switches físicos
          BR0_MAC=$(ip link show br0 | awk '/ether/ {print $2}')
          MAC_ADDR=$(echo "$BR0_MAC" | tr -d ':')
          DPID="0000${MAC_ADDR}"
          
          echo "Creando br-sdn con DPID físico estático: $DPID..."
          ovs-vsctl --may-exist add-br br-sdn
          ovs-vsctl set bridge br-sdn other-config:datapath-id=$DPID
          ovs-vsctl set bridge br-sdn other-config:hwaddr=$BR0_MAC
          ip link set br-sdn address $BR0_MAC
          ip link set br-sdn up

          echo "Asignando gateway/collector SDN local 10.0.0.1/24 al br-sdn..."
          ip addr show br-sdn | grep -q "10.0.0.1/24" || ip addr add 10.0.0.1/24 dev br-sdn || true
          
          echo "Conectando al controlador Ryu..."
          ovs-vsctl set bridge br-sdn protocols=OpenFlow13
          ovs-vsctl set-controller br-sdn tcp:127.0.0.1:6653

          refresh_table_miss() {
            ovs-ofctl -O OpenFlow13 add-flow br-sdn "priority=0,actions=CONTROLLER:65535" > /dev/null 2>&1 || true
          }
          refresh_table_miss
          
          echo "Obteniendo IP del Redis Master vía Sentinel..."
          MY_IP=$(get_br0_ip)
          MASTER_IP=$(get_redis_master)
          if [ -n "$MASTER_IP" ] && redis-cli -h "$MASTER_IP" PING > /dev/null 2>&1; then
            redis-cli -h $MASTER_IP HSET topology:node_names $DPID $NODE_NAME || true
            redis-cli -h $MASTER_IP HSET topology:node_ips $DPID $MY_IP || true
            echo "Nodo registrado en Master $MASTER_IP: $NODE_NAME ($MY_IP)"
          else
            echo "Error: No se pudo obtener el Redis Master de Sentinel."
          fi

          echo "Esperando 15 segundos para dar tiempo a convergencia topologica de lldpd..."
          sleep 15

          echo "Evaluando mapa físico mediante LLDP Point-to-Point asíncrono..."
          mkdir -p /run/ryu-vx-stale
          while true; do
            # Identificar MgmtIP capturadas por LLDP en interfaces físicas puras (ej. lldp.ens4.chassis.mgmt-ip=192.168.122.101)
            MY_IP=$(get_br0_ip)
            if [ -z "$MY_IP" ]; then
              echo "br0 perdio IPv4 de gestion; pausando heartbeat SDN..."
              sleep 3
              continue
            fi

            MASTER_IP=$(get_redis_master)
            if [ -z "$MASTER_IP" ] || ! redis-cli -h "$MASTER_IP" PING > /dev/null 2>&1; then
              echo "Redis Master no alcanzable; pausando heartbeat SDN..."
              sleep 3
              continue
            fi

            PHYSICAL_NEIGHBORS=$(lldpcli show neighbors -f keyvalue 2>/dev/null | grep "\.mgmt-ip=" | cut -d= -f2 | grep -E "^192\.168\." | sort -u || true)

            for remote_ip in $PHYSICAL_NEIGHBORS; do
              # Validar IP
              if [ -z "$remote_ip" ] || [ "$remote_ip" = "$MY_IP" ]; then continue; fi

              # Nombre de puerto unico: vx + los 4 octetos sin puntos
              PORT_NAME="vx$(echo $remote_ip | tr -d '.')"
              
              # Crear el tunel VXLAN SDN hacia lo que físicamente existe
              if ! ovs-vsctl list-ports br-sdn | grep -q "^${PORT_NAME}$"; then
                echo "Auto-detectado vecino L2 físico: $remote_ip. Instanciando encapsulación SDN..."
                ovs-vsctl --may-exist add-port br-sdn $PORT_NAME \
                  -- set interface $PORT_NAME type=vxlan \
                     options:remote_ip=$remote_ip \
                     options:key=100 \
                     options:dst_port=4789 \
                  > /dev/null 2>&1 || true
                ovs-ofctl -O OpenFlow13 del-flows br-sdn > /dev/null 2>&1 || true
                refresh_table_miss
              fi
              rm -f "/run/ryu-vx-stale/${PORT_NAME}" 2>/dev/null || true
            done

            for vx_port in $(ovs-vsctl list-ports br-sdn 2>/dev/null | grep "^vx" || true); do
              remote_ip=$(echo "$vx_port" | sed -E 's/^vx192168122([0-9]{1,3})$/192.168.122.\1/')
              if echo "$PHYSICAL_NEIGHBORS" | grep -qx "$remote_ip"; then
                rm -f "/run/ryu-vx-stale/${vx_port}" 2>/dev/null || true
                continue
              fi

              miss_file="/run/ryu-vx-stale/${vx_port}"
              misses=0
              [ -f "$miss_file" ] && misses=$(cat "$miss_file" 2>/dev/null || echo 0)
              misses=$((misses + 1))
              echo "$misses" > "$miss_file"
              if [ "$misses" -ge 4 ]; then
                echo "Vecino LLDP perdido: $remote_ip ($vx_port). Eliminando túnel VXLAN obsoleto..."
                ovs-vsctl --if-exists del-port br-sdn "$vx_port" > /dev/null 2>&1 || true
                ovs-ofctl -O OpenFlow13 del-flows br-sdn > /dev/null 2>&1 || true
                refresh_table_miss
                rm -f "$miss_file" 2>/dev/null || true
              fi
            done

            # Añadir Guests en cualquier interfaz ensX que NO pertenezca a br0 (topología física)
            for intf in $(ls /sys/class/net | grep -E "^ens[4-9]$|^ens[1-9][0-9]$"); do
              if ip link show $intf | grep -q "master br0"; then continue; fi
              
              if ! ovs-vsctl list-ports br-sdn | grep -q "^$intf$"; then
                echo "Auto-detectado nuevo Guest en $intf. Añadiendo a la red SDN..."
                ip link set $intf up > /dev/null 2>&1 || true
                ovs-vsctl --may-exist add-port br-sdn $intf > /dev/null 2>&1 || true
              fi
            done

            # Persistir ubicación de guests conocidos usando la FDB local de OVS.
            # Esto reconstruye el mapa aunque Ryu haya reiniciado y todavía no haya recibido Packet-In.
            if [ -n "$MASTER_IP" ] && [ -n "$DPID" ]; then
              DPID_DEC=$((16#$DPID))
              KNOWN_GUESTS=$(redis-cli -h $MASTER_IP HKEYS topology:guest_ips 2>/dev/null || true)
              for intf in $(ovs-vsctl list-ports br-sdn 2>/dev/null | grep -E "^ens" || true); do
                OFPORT=$(ovs-vsctl get Interface "$intf" ofport 2>/dev/null || echo "")
                [ -z "$OFPORT" ] && continue
                for guest_mac in $(ovs-appctl fdb/show br-sdn 2>/dev/null | awk -v port="$OFPORT" '$1 == port {print $3}'); do
                  if echo "$KNOWN_GUESTS" | grep -qx "$guest_mac"; then
                    redis-cli -h $MASTER_IP HSET "mac_to_port:${DPID_DEC}" "$guest_mac" "$OFPORT" > /dev/null 2>&1 || true
                    redis-cli -h $MASTER_IP HSET topology:guest_locations "$guest_mac" "${DPID_DEC}:${OFPORT}" > /dev/null 2>&1 || true
                  fi
                done
              done
            fi

            # Heartbeat (Latido L2): Avisar al Controlador global que este nodo físico sigue vivo. (TTL 30s)
            if [ -n "$MASTER_IP" ] && [ -n "$DPID" ]; then
              redis-cli -h $MASTER_IP HSET topology:node_names $DPID $NODE_NAME > /dev/null 2>&1 || true
              redis-cli -h $MASTER_IP HSET topology:node_ips $DPID $MY_IP > /dev/null 2>&1 || true
              OLD_BR0_STP_KEYS=$(redis-cli -h $MASTER_IP HKEYS topology:br0_stp_ports 2>/dev/null | grep "^${DPID}:" || true)
              for stp_key in $OLD_BR0_STP_KEYS; do
                redis-cli -h $MASTER_IP HDEL topology:br0_stp_ports "$stp_key" > /dev/null 2>&1 || true
              done
              for stp_intf in $(ls /sys/class/net/br0/brif 2>/dev/null || true); do
                STATE_NUM=$(cat /sys/class/net/br0/brif/$stp_intf/state 2>/dev/null || echo "")
                case "$STATE_NUM" in
                  0) STP_STATE="disabled" ;;
                  1) STP_STATE="listening" ;;
                  2) STP_STATE="learning" ;;
                  3) STP_STATE="forwarding" ;;
                  4) STP_STATE="blocking" ;;
                  *) STP_STATE="unknown" ;;
                esac
                REMOTE_IP=$(lldpcli show neighbors -f keyvalue 2>/dev/null | grep "^lldp.${stp_intf}.chassis.mgmt-ip=" | cut -d= -f2 | grep -E "^192\.168\." | head -n 1 || true)
                if [ -n "$REMOTE_IP" ]; then
                  redis-cli -h $MASTER_IP HSET topology:br0_stp_ports "$DPID:$stp_intf" "$STP_STATE:$REMOTE_IP" > /dev/null 2>&1 || true
                fi
              done
              redis-cli -h $MASTER_IP SET "switch:alive:$DPID" "1" EX 15 > /dev/null 2>&1 || true
            fi
            sleep 2
          done
        volumeMounts:
        - name: libmodules
          mountPath: /lib/modules
          readOnly: true
        - name: run-openvswitch
          mountPath: /var/run/openvswitch
        readinessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - |
              test -e /sys/class/net/br0 &&
              test -e /sys/class/net/br-sdn &&
              ovs-vsctl br-exists br-sdn &&
              ovs-vsctl get-controller br-sdn | grep -q "tcp:127.0.0.1:6653"
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        startupProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - |
              test -e /sys/class/net/br0 &&
              ovs-vsctl br-exists br-sdn
          periodSeconds: 5
          failureThreshold: 90
        livenessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - |
              test -e /sys/class/net/br0 &&
              ovs-vsctl br-exists br-sdn
          periodSeconds: 20
          failureThreshold: 6
      volumes:
      - name: libmodules
        hostPath:
          path: /lib/modules
      - name: run-openvswitch
        hostPath:
          path: /var/run/openvswitch
          type: DirectoryOrCreate

---
# ==========================
# Web Dashboard de Topología (Backend + Frontend)
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ryu-topology
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ryu-topology
  template:
    metadata:
      labels:
        app: ryu-topology
    spec:
      containers:
      - name: dashboard
        image: arturoalvarez/ryu-topology:latest
        imagePullPolicy: Always
        env:
        - name: REDIS_SENTINEL_HOST
          value: "redis-sentinel.sdn-controller.svc.cluster.local"
        - name: REDIS_SENTINEL_PORT
          value: "26379"
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
        - name: code-volume
          mountPath: /app/templates/index.html
          subPath: index.html
      volumes:
      - name: code-volume
        configMap:
          name: ryu-topology-code

---
apiVersion: v1
kind: Service
metadata:
  name: ryu-topology
  namespace: sdn-controller
  labels:
    app: ryu-topology
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 5000
    protocol: TCP
  selector:
    app: ryu-topology

---
# ==========================
# Servidor DHCP Distribuido sobre Red VXLAN L2 
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sdn-dhcp-server
  namespace: sdn-controller
  labels:
    app: sdn-dhcp
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
  selector:
    matchLabels:
      app: sdn-dhcp
  template:
    metadata:
      labels:
        app: sdn-dhcp
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: dhcp
        image: arturoalvarez/ryu-dhcp:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
        env:
        - name: REDIS_SENTINEL_HOST
          value: "redis-sentinel.sdn-controller.svc.cluster.local"
        - name: REDIS_SENTINEL_PORT
          value: "26379"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -e /sys/class/net/br-sdn
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
        startupProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -e /sys/class/net/br-sdn
          periodSeconds: 5
          failureThreshold: 90
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -e /sys/class/net/br-sdn
          periodSeconds: 20
          failureThreshold: 6
      volumes:
      - name: code-volume
        configMap:
          name: dhcp-code

---
# ==========================
# Colector de Telemetría IoT (Smart Meter Collector)
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: meter-collector
  namespace: sdn-controller
  labels:
    app: meter-collector
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
  selector:
    matchLabels:
      app: meter-collector
  template:
    metadata:
      labels:
        app: meter-collector
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: collector
        image: arturoalvarez/sdn-meter-collector:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        - containerPort: 5555
          name: udp-telemetry
          protocol: UDP
        env:
        - name: REDIS_SENTINEL_HOST
          value: "redis-sentinel.sdn-controller.svc.cluster.local"
        - name: REDIS_SENTINEL_PORT
          value: "26379"
        - name: UDP_PORT
          value: "5555"
        - name: FLASK_PORT
          value: "5000"
        - name: MAX_READINGS_PER_DEVICE
          value: "100"
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: code-volume
        configMap:
          name: meter-collector-code
---
apiVersion: v1
kind: Service
metadata:
  name: meter-collector
  namespace: sdn-controller
  labels:
    app: meter-collector
spec:
  type: LoadBalancer
  ports:
  - name: http-dashboard
    port: 8081
    targetPort: 5000
    protocol: TCP
  selector:
    app: meter-collector

---
# ==========================
# Observabilidad: Prometheus + Grafana + Node Exporter
# ==========================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: sdn-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sdn-prometheus
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sdn-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sdn-prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: sdn-controller
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sdn-controller
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
    - job_name: prometheus
      static_configs:
      - targets:
        - localhost:9090

    - job_name: ryu
      scrape_interval: 2s
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - sdn-controller
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: ([^:]+);(\d+)
        replacement: ${1}:${2}
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

    - job_name: node-exporter
      kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
          - sdn-controller
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app]
        action: keep
        regex: node-exporter
      - source_labels: [__meta_kubernetes_endpoint_node_name]
        target_label: node
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: sdn-controller
  labels:
    app: prometheus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: prometheus
              topologyKey: kubernetes.io/hostname
      containers:
      - name: prometheus
        image: prom/prometheus:v2.53.3
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --storage.tsdb.retention.time=6h
        - --web.enable-lifecycle
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 20
          periodSeconds: 30
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sdn-controller
  labels:
    app: prometheus
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 9090
    targetPort: 9090
  selector:
    app: prometheus
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: sdn-controller
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
      - operator: Exists
      containers:
      - name: node-exporter
        image: prom/node-exporter:v1.8.2
        args:
        - --path.procfs=/host/proc
        - --path.sysfs=/host/sys
        - --path.rootfs=/host/root
        - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
        ports:
        - containerPort: 9100
          name: metrics
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: root
          mountPath: /host/root
          readOnly: true
      volumes:
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys
      - name: root
        hostPath:
          path: /
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: sdn-controller
  labels:
    app: node-exporter
spec:
  clusterIP: None
  ports:
  - name: metrics
    port: 9100
    targetPort: 9100
  selector:
    app: node-exporter
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: sdn-controller
data:
  loki.yml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
      - from: 2020-10-24
        store: boltdb-shipper
        object_store: filesystem
        schema: v11
        index:
          prefix: index_
          period: 24h
    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 24h
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: sdn-controller
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:2.9.8
        args:
        - -config.file=/etc/loki/loki.yml
        ports:
        - containerPort: 3100
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        - name: data
          mountPath: /loki
        readinessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: config
        configMap:
          name: loki-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: sdn-controller
  labels:
    app: loki
spec:
  ports:
  - name: http
    port: 3100
    targetPort: 3100
  selector:
    app: loki
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: sdn-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sdn-promtail
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods", "namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sdn-promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sdn-promtail
subjects:
- kind: ServiceAccount
  name: promtail
  namespace: sdn-controller
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: sdn-controller
data:
  promtail.yml: |
    server:
      http_listen_port: 3101
    positions:
      filename: /run/promtail/positions.yaml
    clients:
    - url: http://loki.sdn-controller.svc.cluster.local:3100/loki/api/v1/push
    scrape_configs:
    - job_name: ryu-container-logs
      static_configs:
      - targets:
        - localhost
        labels:
          namespace: sdn-controller
          app: ryu
          __path__: /var/log/containers/ryu-*_sdn-controller_ryu-*.log
      pipeline_stages:
