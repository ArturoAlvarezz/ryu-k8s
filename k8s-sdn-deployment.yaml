---
apiVersion: v1
kind: Namespace
metadata:
  name: sdn-controller
---
# ==========================
# Redis Components
# ==========================
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: sdn-controller
spec:
  clusterIP: None
  ports:
  - name: redis
    port: 6379
  - name: sentinel
    port: 26379
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: sdn-controller
spec:
  ports:
  - name: sentinel
    port: 26379
    targetPort: 26379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: sdn-controller
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      initContainers:
      - name: setup-ha
        image: redis:7-alpine
        command:
        - sh
        - -c
        - |
          # Solo crear configuración si el Pod es nuevo (volumen nuevo)
          if [ ! -f /data/sentinel.conf ]; then
            echo "bind 0.0.0.0" > /data/redis.conf
            if [ "$HOSTNAME" != "redis-0" ]; then
              echo "replicaof redis-0.redis-headless.sdn-controller.svc.cluster.local 6379" >> /data/redis.conf
            fi
            
            echo "bind 0.0.0.0" > /data/sentinel.conf
            echo "sentinel monitor mymaster redis-0.redis-headless.sdn-controller.svc.cluster.local 6379 2" >> /data/sentinel.conf
            echo "sentinel down-after-milliseconds mymaster 2000" >> /data/sentinel.conf
            echo "sentinel failover-timeout mymaster 5000" >> /data/sentinel.conf
            echo "sentinel parallel-syncs mymaster 1" >> /data/sentinel.conf
            echo "sentinel resolve-hostnames yes" >> /data/sentinel.conf
            echo "sentinel announce-hostnames yes" >> /data/sentinel.conf
            chmod 666 /data/sentinel.conf
          fi
        volumeMounts:
        - name: data
          mountPath: /data
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server", "/data/redis.conf"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: data
          mountPath: /data
      - name: sentinel
        image: redis:7-alpine
        command: ["redis-server", "/data/sentinel.conf", "--sentinel"]
        ports:
        - containerPort: 26379
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
---
# ==========================
# Distributed Ryu Controller Components
# ==========================
apiVersion: v1
kind: Service
metadata:
  name: ryu-openflow
  namespace: sdn-controller
spec:
  type: LoadBalancer # Exposes the service externally. For K3s, this will use Klipper. NodePort is also a valid fallback.
  ports:
  - name: openflow-6653
    port: 6653
    targetPort: 6653
    protocol: TCP
  - name: openflow-6633
    port: 6633
    targetPort: 6633
    protocol: TCP
  selector:
    app: ryu
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ryu
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ryu
  template:
    metadata:
      labels:
        app: ryu
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: ryu
        image: arturoalvarez/ryu-controller:latest
        command: ["ryu-manager", "--observe-links", "app.py"]
        env:
        - name: REDIS_SENTINEL_HOST
          value: "redis-sentinel.sdn-controller.svc.cluster.local"
        - name: REDIS_SENTINEL_PORT
          value: "26379"
        - name: METRICS_PORT
          value: "8000"
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
      volumes:
      - name: code-volume
        configMap:
          name: ryu-code

---
# ==========================
# Auto-Configurador de OVS Host (DaemonSet) - Compatible Kernel Host
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ovs-sdn-initializer
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ovs-init
  template:
    metadata:
      labels:
        app: ovs-init
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: ovs-configurator
        image: ubuntu:22.04  # Usamos la misma base nativa del nodo anfitrión
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command:
        - /bin/bash
        - -c
        - |
          echo "Instalando dependencias y demonios de red nativa L2..."
          apt-get update > /dev/null
          apt-get install -y openvswitch-switch kmod iproute2 redis-tools lldpd jq > /dev/null
          
          echo "Cargando módulo del kernel..."
          modprobe openvswitch || true
          
          echo "Iniciando servicio OVS y LLDPD..."
          service openvswitch-switch start
          mkdir -p /run/lldpd
          lldpd -d &
          sleep 2
          
          echo "Limpiando estado anterior para evitar fantasmas..."
          ovs-vsctl --if-exists del-br br-sdn
          
          # Generar el DPID permanente usando la MAC principal de la máquina (br0) tal como los switches físicos
          MAC_ADDR=$(ip link show br0 | awk '/ether/ {print $2}' | tr -d ':')
          DPID="0000${MAC_ADDR}"
          
          echo "Creando br-sdn con DPID físico estático: $DPID..."
          ovs-vsctl --may-exist add-br br-sdn
          ovs-vsctl set bridge br-sdn other-config:datapath-id=$DPID
          ip link set br-sdn up

          if [ "$NODE_NAME" = "master" ]; then
            echo "Asignando gateway/collector SDN 10.0.0.1/24 al br-sdn del Maestro..."
            ip addr show br-sdn | grep -q "10.0.0.1/24" || ip addr add 10.0.0.1/24 dev br-sdn || true
          fi
          
          echo "Conectando al controlador Ryu..."
          ovs-vsctl set bridge br-sdn protocols=OpenFlow13
          ovs-vsctl set-controller br-sdn tcp:127.0.0.1:6653
          
          echo "Obteniendo IP del Redis Master vía Sentinel..."
          MY_IP=$(ip route get 1.1.1.1 2>/dev/null | awk '{print $7; exit}' || ip addr show br0 | awk '/inet / {print $2}' | cut -d/ -f1 | head -1)
          MASTER_IP=$(redis-cli -h redis-sentinel.sdn-controller.svc.cluster.local -p 26379 sentinel get-master-addr-by-name mymaster | head -n 1)
          if [ -n "$MASTER_IP" ]; then
            redis-cli -h $MASTER_IP HSET topology:node_names $DPID $NODE_NAME || true
            redis-cli -h $MASTER_IP HSET topology:node_ips $DPID $MY_IP || true
            echo "Nodo registrado en Master $MASTER_IP: $NODE_NAME ($MY_IP)"
          else
            echo "Error: No se pudo obtener el Redis Master de Sentinel."
          fi

          echo "Activando RSTP (Anti-Bucles)..."
          ovs-vsctl set bridge br-sdn rstp_enable=true

          echo "Esperando 15 segundos para dar tiempo a convergencia topologica de lldpd..."
          sleep 15

          echo "Evaluando mapa físico mediante LLDP Point-to-Point asíncrono..."
          while true; do
            # Identificar MgmtIP capturadas por LLDP en interfaces físicas puras (ej. lldp.ens4.chassis.mgmt-ip=192.168.122.101)
            PHYSICAL_NEIGHBORS=$(lldpcli show neighbors -f keyvalue 2>/dev/null | grep "\.mgmt-ip=" | cut -d= -f2 | grep -E "^192\.168\." | sort -u || true)

            for remote_ip in $PHYSICAL_NEIGHBORS; do
              # Validar IP
              if [ -z "$remote_ip" ] || [ "$remote_ip" = "$MY_IP" ]; then continue; fi

              # Nombre de puerto unico: vx + los 4 octetos sin puntos
              PORT_NAME="vx$(echo $remote_ip | tr -d '.')"
              
              # Crear el tunel VXLAN SDN hacia lo que físicamente existe
              if ! ovs-vsctl list-ports br-sdn | grep -q "^${PORT_NAME}$"; then
                echo "Auto-detectado vecino L2 físico: $remote_ip. Instanciando encapsulación SDN..."
                ovs-vsctl --may-exist add-port br-sdn $PORT_NAME \
                  -- set interface $PORT_NAME type=vxlan \
                     options:remote_ip=$remote_ip \
                     options:key=100 \
                     options:dst_port=4789 \
                  > /dev/null 2>&1 || true
              fi
            done

            # Añadir Guests en cualquier interfaz ensX que NO pertenezca a br0 (topología física)
            for intf in $(ls /sys/class/net | grep -E "^ens[4-9]$|^ens[1-9][0-9]$"); do
              if ip link show $intf | grep -q "master br0"; then continue; fi
              
              if ! ovs-vsctl list-ports br-sdn | grep -q "^$intf$"; then
                echo "Auto-detectado nuevo Guest en $intf. Añadiendo a la red SDN..."
                ip link set $intf up > /dev/null 2>&1 || true
                ovs-vsctl --may-exist add-port br-sdn $intf > /dev/null 2>&1 || true
              fi
            done
            # Heartbeat (Latido L2): Avisar al Controlador global que este nodo físico sigue vivo. (TTL 30s)
            if [ -n "$MASTER_IP" ] && [ -n "$DPID" ]; then
              redis-cli -h $MASTER_IP HSET topology:node_names $DPID $NODE_NAME > /dev/null 2>&1 || true
              redis-cli -h $MASTER_IP HSET topology:node_ips $DPID $MY_IP > /dev/null 2>&1 || true
              OLD_RSTP_KEYS=$(redis-cli -h $MASTER_IP HKEYS topology:rstp_ports 2>/dev/null | grep "^${DPID}:" || true)
              for rstp_key in $OLD_RSTP_KEYS; do
                redis-cli -h $MASTER_IP HDEL topology:rstp_ports "$rstp_key" > /dev/null 2>&1 || true
              done
              OLD_BR0_STP_KEYS=$(redis-cli -h $MASTER_IP HKEYS topology:br0_stp_ports 2>/dev/null | grep "^${DPID}:" || true)
              for stp_key in $OLD_BR0_STP_KEYS; do
                redis-cli -h $MASTER_IP HDEL topology:br0_stp_ports "$stp_key" > /dev/null 2>&1 || true
              done
              for stp_intf in $(ls /sys/class/net/br0/brif 2>/dev/null || true); do
                STATE_NUM=$(cat /sys/class/net/br0/brif/$stp_intf/state 2>/dev/null || echo "")
                case "$STATE_NUM" in
                  0) STP_STATE="disabled" ;;
                  1) STP_STATE="listening" ;;
                  2) STP_STATE="learning" ;;
                  3) STP_STATE="forwarding" ;;
                  4) STP_STATE="blocking" ;;
                  *) STP_STATE="unknown" ;;
                esac
                REMOTE_IP=$(lldpcli show neighbors -f keyvalue 2>/dev/null | grep "^lldp.${stp_intf}.chassis.mgmt-ip=" | cut -d= -f2 | grep -E "^192\.168\." | head -n 1 || true)
                if [ -n "$REMOTE_IP" ]; then
                  redis-cli -h $MASTER_IP HSET topology:br0_stp_ports "$DPID:$stp_intf" "$STP_STATE:$REMOTE_IP" > /dev/null 2>&1 || true
                fi
              done
              for rstp_port in $(ovs-vsctl list-ports br-sdn | grep "^vx" || true); do
                RSTP_STATUS=$(ovs-vsctl get port "$rstp_port" rstp_status 2>/dev/null || true)
                RSTP_STATE=$(echo "$RSTP_STATUS" | sed -n 's/.*rstp_port_state=\([^,}]*\).*/\1/p' | tr -d '"')
                RSTP_ROLE=$(echo "$RSTP_STATUS" | sed -n 's/.*rstp_port_role=\([^,}]*\).*/\1/p' | tr -d '"')
                if [ -n "$RSTP_STATE" ]; then
                  redis-cli -h $MASTER_IP HSET topology:rstp_ports "$DPID:$rstp_port" "$RSTP_STATE:$RSTP_ROLE" > /dev/null 2>&1 || true
                fi
              done
              redis-cli -h $MASTER_IP SET "switch:alive:$DPID" "1" EX 30 > /dev/null 2>&1 || true
            fi
            sleep 10
          done
        volumeMounts:
        - name: libmodules
          mountPath: /lib/modules
          readOnly: true
        - name: run-openvswitch
          mountPath: /var/run/openvswitch
      volumes:
      - name: libmodules
        hostPath:
          path: /lib/modules
      - name: run-openvswitch
        hostPath:
          path: /var/run/openvswitch
          type: DirectoryOrCreate

---
# ==========================
# Web Dashboard de Topología (Backend + Frontend)
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ryu-topology
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ryu-topology
  template:
    metadata:
      labels:
        app: ryu-topology
    spec:
      containers:
      - name: dashboard
        image: arturoalvarez/ryu-topology:latest
        imagePullPolicy: Always
        env:
        - name: REDIS_SENTINEL_HOST
          value: "redis-sentinel.sdn-controller.svc.cluster.local"
        - name: REDIS_SENTINEL_PORT
          value: "26379"
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
        - name: code-volume
          mountPath: /app/templates/index.html
          subPath: index.html
      volumes:
      - name: code-volume
        configMap:
          name: ryu-topology-code

---
apiVersion: v1
kind: Service
metadata:
  name: ryu-topology
  namespace: sdn-controller
  labels:
    app: ryu-topology
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 5000
    protocol: TCP
  selector:
    app: ryu-topology

---
# ==========================
# Servidor DHCP Distribuido sobre Red VXLAN L2 
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sdn-dhcp-server
  namespace: sdn-controller
  labels:
    app: sdn-dhcp
spec:
  selector:
    matchLabels:
      app: sdn-dhcp
  template:
    metadata:
      labels:
        app: sdn-dhcp
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: dhcp
        image: arturoalvarez/ryu-dhcp:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
        env:
        - name: REDIS_SENTINEL_HOST
          value: "redis-sentinel.sdn-controller.svc.cluster.local"
        - name: REDIS_SENTINEL_PORT
          value: "26379"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
      volumes:
      - name: code-volume
        configMap:
          name: dhcp-code

---
# ==========================
# Colector de Telemetría IoT (Smart Meter Collector)
# ==========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meter-collector
  namespace: sdn-controller
  labels:
    app: meter-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meter-collector
  template:
    metadata:
      labels:
        app: meter-collector
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: master
      containers:
      - name: collector
        image: arturoalvarez/sdn-meter-collector:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        - containerPort: 5555
          name: udp-telemetry
          protocol: UDP
        env:
        - name: REDIS_SENTINEL_HOST
          value: "redis-sentinel.sdn-controller.svc.cluster.local"
        - name: REDIS_SENTINEL_PORT
          value: "26379"
        - name: UDP_PORT
          value: "5555"
        - name: FLASK_PORT
          value: "5000"
        - name: MAX_READINGS_PER_DEVICE
          value: "100"
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: code-volume
        configMap:
          name: meter-collector-code
---
apiVersion: v1
kind: Service
metadata:
  name: meter-collector
  namespace: sdn-controller
  labels:
    app: meter-collector
spec:
  type: LoadBalancer
  ports:
  - name: http-dashboard
    port: 8081
    targetPort: 5000
    protocol: TCP
  selector:
    app: meter-collector

---
# ==========================
# Observabilidad: Prometheus + Grafana + Node Exporter
# ==========================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: sdn-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sdn-prometheus
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sdn-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sdn-prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: sdn-controller
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sdn-controller
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    scrape_configs:
    - job_name: prometheus
      static_configs:
      - targets:
        - localhost:9090

    - job_name: ryu
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - sdn-controller
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: ([^:]+);(\d+)
        replacement: ${1}:${2}
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

    - job_name: node-exporter
      kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
          - sdn-controller
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app]
        action: keep
        regex: node-exporter
      - source_labels: [__meta_kubernetes_endpoint_node_name]
        target_label: node
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: sdn-controller
  labels:
    app: prometheus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: prometheus
              topologyKey: kubernetes.io/hostname
      containers:
      - name: prometheus
        image: prom/prometheus:v2.53.3
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --storage.tsdb.retention.time=6h
        - --web.enable-lifecycle
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 20
          periodSeconds: 30
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sdn-controller
  labels:
    app: prometheus
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 9090
    targetPort: 9090
  selector:
    app: prometheus
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: sdn-controller
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
      - operator: Exists
      containers:
      - name: node-exporter
        image: prom/node-exporter:v1.8.2
        args:
        - --path.procfs=/host/proc
        - --path.sysfs=/host/sys
        - --path.rootfs=/host/root
        - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
        ports:
        - containerPort: 9100
          name: metrics
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: root
          mountPath: /host/root
          readOnly: true
      volumes:
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys
      - name: root
        hostPath:
          path: /
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: sdn-controller
  labels:
    app: node-exporter
spec:
  clusterIP: None
  ports:
  - name: metrics
    port: 9100
    targetPort: 9100
  selector:
    app: node-exporter
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: sdn-controller
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      access: proxy
      url: http://prometheus.sdn-controller.svc.cluster.local:9090
      isDefault: true
  dashboards.yml: |
    apiVersion: 1
    providers:
    - name: SDN
      orgId: 1
      folder: SDN
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: sdn-controller
data:
  sdn-observability.json: |
    {
      "uid": "sdn-observability",
      "title": "SDN Observabilidad",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "timezone": "browser",
      "templating": {
        "list": [
          {
            "name": "src_guest",
            "label": "Guest origen",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(ryu_topology_node_info{type=\"guest\"}, id)",
            "refresh": 1,
            "sort": 1,
            "includeAll": false,
            "multi": false
          },
          {
            "name": "dst_guest",
            "label": "Guest destino",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(ryu_topology_node_info{type=\"guest\"}, id)",
            "refresh": 1,
            "sort": 1,
            "includeAll": false,
            "multi": false
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "type": "nodeGraph",
          "title": "Mapa SDN y camino entre guests",
          "gridPos": {"x": 0, "y": 0, "w": 24, "h": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "nodes",
              "expr": "max by (id, title, subtitle, mainstat, color, icon, type) (ryu_topology_node_info)",
              "format": "table",
              "instant": true
            },
            {
              "refId": "edges",
              "expr": "max by (id, source, target, mainstat, secondarystat, color, strokeDasharray, thickness, type) (ryu_topology_edge_info or ryu_trace_path_edge_info{src_guest=\"$src_guest\",dst_guest=\"$dst_guest\"})",
              "format": "table",
              "instant": true
            }
          ],
          "options": {
            "layout": "force",
            "zoomMode": "greedy",
            "nodes": {
              "mainStatUnit": "short",
              "secondaryStatUnit": "short"
            },
            "edges": {
              "mainStatUnit": "short",
              "secondaryStatUnit": "short"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Packet-In por segundo",
          "gridPos": {"x": 0, "y": 18, "w": 12, "h": 8},
          "targets": [{"expr": "sum by (dpid) (rate(ryu_packet_in_total[1m]))", "legendFormat": "switch {{dpid}}"}]
        },
        {
          "type": "stat",
          "title": "Nodos activos",
          "gridPos": {"x": 12, "y": 18, "w": 6, "h": 4},
          "targets": [{"expr": "max(ryu_active_nodes)", "legendFormat": "nodos"}]
        },
        {
          "type": "stat",
          "title": "Switches activos",
          "gridPos": {"x": 18, "y": 18, "w": 6, "h": 4},
          "targets": [{"expr": "max(ryu_active_switches)", "legendFormat": "switches"}]
        },
        {
          "type": "bargauge",
          "title": "Flujos instalados por switch",
          "gridPos": {"x": 12, "y": 22, "w": 12, "h": 4},
          "targets": [{"expr": "max by (dpid) (ryu_installed_flows)", "legendFormat": "{{dpid}}"}]
        },
        {
          "type": "timeseries",
          "title": "Nodos con mas trafico",
          "gridPos": {"x": 0, "y": 26, "w": 12, "h": 8},
          "targets": [{"expr": "topk(5, sum by (node) (rate(node_network_receive_bytes_total{device!~\"lo|cni.*|flannel.*|veth.*\"}[1m]) + rate(node_network_transmit_bytes_total{device!~\"lo|cni.*|flannel.*|veth.*\"}[1m])))", "legendFormat": "{{node}}"}]
        },
        {
          "type": "timeseries",
          "title": "CPU por nodo",
          "gridPos": {"x": 12, "y": 26, "w": 12, "h": 8},
          "targets": [{"expr": "100 - (avg by (node) (rate(node_cpu_seconds_total{mode=\"idle\"}[1m])) * 100)", "legendFormat": "{{node}}"}]
        },
        {
          "type": "timeseries",
          "title": "Memoria usada por nodo",
          "gridPos": {"x": 0, "y": 34, "w": 12, "h": 8},
          "targets": [{"expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100", "legendFormat": "{{node}}"}]
        },
        {
          "type": "timeseries",
          "title": "Trafico SDN por puerto OpenFlow",
          "gridPos": {"x": 12, "y": 34, "w": 12, "h": 8},
          "targets": [{"expr": "sum by (dpid, port_name) (rate(ryu_port_rx_bytes_total[1m]) + rate(ryu_port_tx_bytes_total[1m]))", "legendFormat": "{{dpid}} {{port_name}}"}]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sdn-controller
  labels:
    app: grafana
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: grafana
              topologyKey: kubernetes.io/hostname
      containers:
      - name: grafana
        image: grafana/grafana:11.1.4
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: Viewer
        volumeMounts:
        - name: provisioning
          mountPath: /etc/grafana/provisioning/datasources/datasource.yml
          subPath: datasource.yml
        - name: provisioning
          mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
          subPath: dashboards.yml
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: provisioning
        configMap:
          name: grafana-provisioning
      - name: dashboards
        configMap:
          name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sdn-controller
  labels:
    app: grafana
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  selector:
    app: grafana
