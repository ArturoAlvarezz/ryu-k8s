---
apiVersion: v1
kind: Namespace
metadata:
  name: sdn-controller
---
# ==========================
# Redis Components
# ==========================
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sdn-controller
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sdn-controller
spec:
  replicas: 1 # For production, consider using a Redis cluster or Sentinel
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
# ==========================
# Distributed Ryu Controller Components
# ==========================
apiVersion: v1
kind: Service
metadata:
  name: ryu-openflow
  namespace: sdn-controller
spec:
  type: LoadBalancer # Exposes the service externally. For K3s, this will use Klipper. NodePort is also a valid fallback.
  ports:
  - name: openflow-6653
    port: 6653
    targetPort: 6653
    protocol: TCP
  - name: openflow-6633
    port: 6633
    targetPort: 6633
    protocol: TCP
  selector:
    app: ryu
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ryu
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ryu
  template:
    metadata:
      labels:
        app: ryu
    spec:
      containers:
      - name: ryu
        image: arturoalvarez/ryu-controller:latest
        command: ["ryu-manager", "--observe-links", "app.py"]
        env:
        - name: REDIS_HOST
          value: "redis.sdn-controller.svc.cluster.local" # FQDN inside K8s pointing to the Redis service
        - name: REDIS_PORT
          value: "6379"
        ports:
        - containerPort: 6653
        - containerPort: 6633

---
# ==========================
# Auto-Configurador de OVS Host (DaemonSet) - Compatible Kernel Host
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ovs-sdn-initializer
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ovs-init
  template:
    metadata:
      labels:
        app: ovs-init
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: ovs-configurator
        image: ubuntu:22.04  # Usamos la misma base nativa del nodo anfitrión
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command:
        - /bin/bash
        - -c
        - |
          echo "Instalando Open vSwitch..."
          apt-get update > /dev/null
          apt-get install -y openvswitch-switch kmod iproute2 redis-tools > /dev/null
          
          echo "Cargando módulo del kernel..."
          modprobe openvswitch || true
          
          echo "Iniciando servicio OVS..."
          service openvswitch-switch start
          sleep 2
          
          echo "Limpiando estado anterior para evitar fantasmas..."
          ovs-vsctl --if-exists del-br br-sdn
          
          # Generar el DPID permanente usando la MAC principal de la máquina (br0) tal como los switches físicos
          MAC_ADDR=$(ip link show br0 | awk '/ether/ {print $2}' | tr -d ':')
          DPID="0000${MAC_ADDR}"
          
          echo "Creando br-sdn con DPID físico estático: $DPID..."
          ovs-vsctl --may-exist add-br br-sdn
          ovs-vsctl set bridge br-sdn other-config:datapath-id=$DPID
          
          echo "Conectando al controlador Ryu..."
          ovs-vsctl set bridge br-sdn protocols=OpenFlow13
          ovs-vsctl set-controller br-sdn tcp:192.168.122.100:6653
          
          echo "Registrando nodo en base de datos global (Redis)..."
          redis-cli -h redis.sdn-controller.svc.cluster.local HSET topology:node_names $DPID $NODE_NAME || true
          
          echo "Activando Protocolo RSTP (Anti-Bucles)..."
          ovs-vsctl set bridge br-sdn rstp_enable=true
          
          echo "Buscando cables físicos inter-nodo en las interfaces reservadas (ens3, ens4, ens5)..."
          MAIN_GW=$(ip route show default | awk '{print $5}' | head -n 1)
          for intf in $(ls /sys/class/net | grep -E "^ens[3-5]$"); do
             # Proteger la interfaz dominante de K3s para evitar que el host pierda conectividad IP
             if [ "$intf" != "$MAIN_GW" ]; then
                 echo "Cable físico L2 detectado en $intf. Integrando a la Infraestructura Core SDN..."
                 ip link set $intf up > /dev/null 2>&1 || true
                 ovs-vsctl --may-exist add-port br-sdn $intf > /dev/null 2>&1 || true
             else
                 echo "Protegiendo interfaz nativa K3s: $intf (Señal de control/Default gateway)"
             fi
          done
          
          echo "Entrando en modo Plug&Play blindado para Guests y Sonda Analítica BFD/RSTP..."
          while true; do
            # 1. Telemetría a Redis de conexiones descartadas/bloqueadas por Spanning Tree
            for port in $(ovs-vsctl list-ports br-sdn | grep -E "^ens[3-5]$"); do
                 state=$(ovs-vsctl get port $port rstp_status:rstp_port_state 2>/dev/null | tr -d '"')
                 ofport=$(ovs-vsctl get interface $port ofport 2>/dev/null)
                 if [ "$state" = "Discarding" ] && [ -n "$ofport" ]; then
                     redis-cli -h redis.sdn-controller.svc.cluster.local HSET topology:blocked_ports "$DPID:$ofport" 1 > /dev/null 2>&1 || true
                 elif [ -n "$ofport" ]; then
                     redis-cli -h redis.sdn-controller.svc.cluster.local HDEL topology:blocked_ports "$DPID:$ofport" > /dev/null 2>&1 || true
                 fi
            done
            
            # 2. Solo buscar a partir del puerto ens6 en adelante para añadir Guests locales de la máquina física
            for intf in $(ls /sys/class/net | grep -E "ens[6-9]|ens[1-9][0-9]"); do
                 # Si el cable está libre, forzar encendido y meter a OVS
                 if ! ovs-vsctl list-ports br-sdn | grep -q "^$intf$"; then
                    echo "Auto-detectado nuevo Guest en $intf. Añadiendo a la red SDN..."
                    ip link set $intf up > /dev/null 2>&1 || true
                    ovs-vsctl --may-exist add-port br-sdn $intf > /dev/null 2>&1 || true
                 fi
            done
            sleep 5
          done
        volumeMounts:
        - name: libmodules
          mountPath: /lib/modules
          readOnly: true
        - name: run-openvswitch
          mountPath: /var/run/openvswitch
      volumes:
      - name: libmodules
        hostPath:
          path: /lib/modules
      - name: run-openvswitch
        hostPath:
          path: /var/run/openvswitch
          type: DirectoryOrCreate

---
# ==========================
# Web Dashboard de Topología (Backend + Frontend)
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ryu-topology
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ryu-topology
  template:
    metadata:
      labels:
        app: ryu-topology
    spec:
      containers:
      - name: dashboard
        image: arturoalvarez/ryu-topology:latest
        imagePullPolicy: Always
        env:
        - name: REDIS_HOST
          value: "redis.sdn-controller.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: ryu-topology
  namespace: sdn-controller
  labels:
    app: ryu-topology
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 5000
    protocol: TCP
  selector:
    app: ryu-topology

---
# ==========================
# Servidor DHCP Distribuido sobre Red VXLAN L2 
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sdn-dhcp-server
  namespace: sdn-controller
  labels:
    app: sdn-dhcp
spec:
  selector:
    matchLabels:
      app: sdn-dhcp
  template:
    metadata:
      labels:
        app: sdn-dhcp
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: dhcp
        image: arturoalvarez/ryu-dhcp:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
        env:
        - name: REDIS_HOST
          value: "redis.sdn-controller.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
