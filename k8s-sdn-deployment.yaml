---
apiVersion: v1
kind: Namespace
metadata:
  name: sdn-controller
---
# ==========================
# Redis Components
# ==========================
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sdn-controller
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sdn-controller
spec:
  replicas: 1 # For production, consider using a Redis cluster or Sentinel
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
# ==========================
# Distributed Ryu Controller Components
# ==========================
apiVersion: v1
kind: Service
metadata:
  name: ryu-openflow
  namespace: sdn-controller
spec:
  type: LoadBalancer # Exposes the service externally. For K3s, this will use Klipper. NodePort is also a valid fallback.
  ports:
  - name: openflow-6653
    port: 6653
    targetPort: 6653
    protocol: TCP
  - name: openflow-6633
    port: 6633
    targetPort: 6633
    protocol: TCP
  selector:
    app: ryu
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ryu
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ryu
  template:
    metadata:
      labels:
        app: ryu
    spec:
      containers:
      - name: ryu
        image: arturoalvarez/ryu-controller:latest
        imagePullPolicy: Always
        env:
        - name: REDIS_HOST
          value: "redis.sdn-controller.svc.cluster.local" # FQDN inside K8s pointing to the Redis service
        - name: REDIS_PORT
          value: "6379"
        ports:
        - containerPort: 6653
        - containerPort: 6633

---
# ==========================
# Auto-Configurador de OVS Host (DaemonSet) - Compatible Kernel Host
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ovs-sdn-initializer
  namespace: sdn-controller
spec:
  selector:
    matchLabels:
      app: ovs-init
  template:
    metadata:
      labels:
        app: ovs-init
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: ovs-configurator
        image: ubuntu:22.04  # Usamos la misma base nativa del nodo anfitrión
        securityContext:
          privileged: true
        command:
        - /bin/bash
        - -c
        - |
          echo "Instalando Open vSwitch..."
          apt-get update > /dev/null
          apt-get install -y openvswitch-switch kmod iproute2 > /dev/null
          
          echo "Cargando módulo del kernel..."
          modprobe openvswitch || true
          
          echo "Iniciando servicio OVS..."
          service openvswitch-switch start
          
          sleep 5
          
          echo "Creando br-sdn..."
          ovs-vsctl --may-exist add-br br-sdn
          
          echo "Conectando al controlador Ryu..."
          ovs-vsctl set bridge br-sdn protocols=OpenFlow13
          ovs-vsctl set-controller br-sdn tcp:192.168.122.100:6653
          
          echo "Listo. Manteniendo Pod vivo..."
          tail -f /dev/null
        volumeMounts:
        - name: libmodules
          mountPath: /lib/modules
          readOnly: true
        - name: run-openvswitch
          mountPath: /var/run/openvswitch
      volumes:
      - name: libmodules
        hostPath:
          path: /lib/modules
      - name: run-openvswitch
        hostPath:
          path: /var/run/openvswitch
          type: DirectoryOrCreate

