---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: sdn-controller
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
