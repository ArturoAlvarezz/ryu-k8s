# Colector y dashboard de telemetria Smart Meter.
---
# ==========================
# Colector de Telemetría IoT (Smart Meter Collector)
# ==========================
apiVersion: v1
kind: Secret
metadata:
  name: meter-hmac-secret
  namespace: sdn-controller
type: Opaque
stringData:
  hmac-secret: "sdn-ami-hmac-lab-secret-v1"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: meter-collector
  namespace: sdn-controller
  labels:
    app: meter-collector
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
  selector:
    matchLabels:
      app: meter-collector
  template:
    metadata:
      labels:
        app: meter-collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: collector
        image: arturoalvarez/sdn-meter-collector:latest
        imagePullPolicy: IfNotPresent
        ports:
        # hostNetwork: el dashboard/API escucha DIRECTAMENTE en el puerto 8081 del
        # host en cada nodo. Asi cualquier nodo (y el VIP cuando lo tiene) sirve
        # :8081 hacia su meter-collector local, SIN depender del ServiceLB/svclb de
        # K3s (cuya cadena NAT etp=Local quedaba rota e indetectable tras reiniciar
        # un control-plane, dejando Operaciones caido sin auto-recuperarse).
        - containerPort: 8081
          name: http
          protocol: TCP
        - containerPort: 5555
          name: udp-telemetry
          protocol: UDP
        env:
        - name: REDIS_SENTINEL_HOST
          value: "redis-sentinel.sdn-controller.svc.cluster.local"
        - name: REDIS_SENTINEL_PORT
          value: "26379"
        - name: REDIS_SOCKET_TIMEOUT
          value: "1.0"
        - name: REDIS_RECONNECT_INTERVAL
          value: "10.0"
        - name: REDIS_RECONNECT_ATTEMPTS
          value: "2"
        - name: UDP_PORT
          value: "5555"
        - name: FLASK_PORT
          value: "8081"
        - name: MAX_READINGS_PER_DEVICE
          value: "100"
        - name: HMAC_ENABLED
          value: "true"
        - name: HMAC_SECRET
          valueFrom:
            secretKeyRef:
              name: meter-hmac-secret
              key: hmac-secret
        - name: MAX_TIME_SKEW_SECONDS
          value: "60"
        - name: NONCE_TTL_SECONDS
          value: "300"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
        - name: code-volume
          mountPath: /app/registry.py
          subPath: registry.py
        - name: code-volume
          mountPath: /app/templates/index.html
          subPath: index.html
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8081
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 30
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 8081
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 12
      volumes:
      - name: code-volume
        configMap:
          name: meter-collector-code
---
apiVersion: v1
kind: Service
metadata:
  name: meter-collector
  namespace: sdn-controller
  labels:
    app: meter-collector
spec:
  # ClusterIP (ya NO LoadBalancer): el acceso externo es por hostNetwork :8081
  # directo (VIP:8081 -> nodo:8081 -> meter-collector local). Asi K3s NO crea pods
  # svclb/Klipper y eliminamos su cadena NAT fragil (etp=Local) que quedaba rota e
  # indetectable tras reiniciar el control-plane que tenia el VIP. Este Service queda
  # solo para DNS/ClusterIP interno.
  type: ClusterIP
  ports:
  - name: http-dashboard
    port: 8081
    targetPort: 8081
    protocol: TCP
  selector:
    app: meter-collector
