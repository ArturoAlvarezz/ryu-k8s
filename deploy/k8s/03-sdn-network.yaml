# Plano SDN del host: OVS/VXLAN y DHCP distribuido.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ovs-sdn-initializer
  namespace: sdn-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ovs-sdn-initializer-node-reader
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ovs-sdn-initializer-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ovs-sdn-initializer-node-reader
subjects:
- kind: ServiceAccount
  name: ovs-sdn-initializer
  namespace: sdn-controller
---
# ==========================
# Auto-Configurador de OVS Host (DaemonSet) - Compatible Kernel Host
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ovs-sdn-initializer
  namespace: sdn-controller
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
  selector:
    matchLabels:
      app: ovs-init
  template:
    metadata:
      labels:
        app: ovs-init
    spec:
      serviceAccountName: ovs-sdn-initializer
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: ovs-configurator
        image: arturoalvarez/ovs-sdn-initializer:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command:
        - /bin/bash
        - -c
        - |
          get_br0_ip() {
            ip -4 addr show br0 2>/dev/null | awk '/inet / {print $2}' | cut -d/ -f1 | head -1
          }

          wait_for_management_plane() {
            while true; do
              MY_IP=$(get_br0_ip)
              if [ -z "$MY_IP" ]; then
                echo "br0 aun no tiene IPv4 de gestion; esperando..."
                sleep 3
                continue
              fi

              if ! ip link show br0 2>/dev/null | grep -q "state UP"; then
                echo "br0 existe pero no esta UP; intentando levantarlo..."
                ip link set br0 up 2>/dev/null || true
                sleep 3
                continue
              fi

              if ! redis-cli -h redis-sentinel.sdn-controller.svc.cluster.local -p 26379 PING > /dev/null 2>&1; then
                echo "Redis Sentinel aun no esta alcanzable desde $MY_IP; esperando..."
                sleep 3
                continue
              fi

              echo "Plano de gestion listo en $MY_IP."
              return 0
            done
          }

          get_redis_master() {
            redis-cli -h redis-sentinel.sdn-controller.svc.cluster.local -p 26379 sentinel get-master-addr-by-name mymaster 2>/dev/null | head -n 1
          }

          is_root_port() {
            intf="$1"
            root_port=$(cat /sys/class/net/br0/bridge/root_port 2>/dev/null || echo "")
            port_id=$(cat "/sys/class/net/br0/brif/$intf/port_id" 2>/dev/null || echo "")
            [ -n "$root_port" ] && [ -n "$port_id" ] || return 1
            port_num=$((0x${port_id#0x} & 0xff))
            [ "$port_num" = "$root_port" ]
          }

          node_role() {
            role=""
            token_file=/var/run/secrets/kubernetes.io/serviceaccount/token
            ca_file=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            if command -v curl >/dev/null 2>&1 && [ -r "$token_file" ] && [ -r "$ca_file" ] && [ -n "${KUBERNETES_SERVICE_HOST:-}" ]; then
              token=$(cat "$token_file" 2>/dev/null || true)
              labels=$(curl -fsS --connect-timeout 1 --max-time 2 --cacert "$ca_file" \
                -H "Authorization: Bearer $token" \
                "https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}/api/v1/nodes/${NODE_NAME}" 2>/dev/null \
                | jq -r '.metadata.labels | keys[]?' 2>/dev/null || true)
              if printf '%s\n' "$labels" | grep -q '^node-role.kubernetes.io/control-plane$\|^node-role.kubernetes.io/master$'; then
                role="control-plane"
              fi
            fi
            if [ -z "$role" ]; then
              case "$NODE_NAME" in
                master|master-*|control-*|controlplane-*|control-plane-*) role="control-plane" ;;
                *) role="worker" ;;
              esac
            fi
            printf '%s' "$role"
          }

          apply_dynamic_stp_costs() {
            LLDP_KV="$1"
            role=$(node_role)
            node_link_cost=${STP_NODE_LINK_COST:-4}
            switch_control_cost=${STP_SWITCH_CONTROL_COST:-20}
            switch_worker_cost=${STP_SWITCH_WORKER_COST:-40}
            unknown_cost=${STP_UNKNOWN_LINK_COST:-80}

            for stp_intf in $(ls /sys/class/net/br0/brif 2>/dev/null || true); do
              remote_ip=$(printf '%s\n' "$LLDP_KV" | grep "^lldp.${stp_intf}.chassis.mgmt-ip=" | cut -d= -f2 | grep -E "^192\.168\." | head -n 1 || true)
              if [ -n "$remote_ip" ]; then
                cost=$node_link_cost
                reason="k3s-neighbor"
              elif is_root_port "$stp_intf" || printf '%s\n' "$LLDP_KV" | grep -q "^lldp.${stp_intf}.chassis.name=Mgmt-STP-Switch$"; then
                if [ "$role" = "control-plane" ]; then
                  cost=$switch_control_cost
                  reason="mgmt-switch-control-plane"
                else
                  cost=$switch_worker_cost
                  reason="mgmt-switch-worker"
                fi
              else
                cost=$unknown_cost
                reason="unknown-neighbor"
              fi
              current=$(bridge -j link show dev "$stp_intf" 2>/dev/null | jq -r '.[0].cost // empty' 2>/dev/null || true)
              if [ "$current" != "$cost" ]; then
                bridge link set dev "$stp_intf" cost "$cost" 2>/dev/null || true
                echo "STP cost $stp_intf=$cost ($reason role=$role)"
              fi
            done
          }

          wait_for_management_plane
          
          echo "Cargando módulo del kernel..."
          modprobe openvswitch || true
          
          echo "Iniciando servicio OVS y LLDPD..."
          service openvswitch-switch start
          mkdir -p /run/lldpd
          lldpd -d &
          sleep 2

          # Generar el DPID permanente usando la MAC principal de la máquina (br0) tal como los switches físicos
          BR0_MAC=$(ip link show br0 | awk '/ether/ {print $2}')
          MAC_ADDR=$(echo "$BR0_MAC" | tr -d ':')
          DPID="0000${MAC_ADDR}"

          if ovs-vsctl br-exists br-sdn; then
            CURRENT_DPID=$(ovs-vsctl get bridge br-sdn other-config:datapath-id 2>/dev/null | tr -d '"' || true)
            if [ "$CURRENT_DPID" != "$DPID" ]; then
              echo "br-sdn tiene DPID inesperado ($CURRENT_DPID != $DPID). Reconstruyendo bridge..."
              ovs-vsctl --if-exists del-br br-sdn
            else
              echo "br-sdn existente valido. Reutilizando bridge para acelerar restauracion."
            fi
          fi

          echo "Asegurando br-sdn con DPID físico estático: $DPID..."
          ovs-vsctl --may-exist add-br br-sdn
          ovs-vsctl set bridge br-sdn other-config:datapath-id=$DPID
          ovs-vsctl set bridge br-sdn other-config:hwaddr=$BR0_MAC
          ip link set br-sdn address $BR0_MAC
          ip link set br-sdn up

          echo "Asignando gateway/collector SDN local 10.0.0.1/24 al br-sdn..."
          ip addr show br-sdn | grep -q "10.0.0.1/24" || ip addr add 10.0.0.1/24 dev br-sdn || true
          
          echo "Conectando al controlador Ryu..."
          ovs-vsctl set bridge br-sdn protocols=OpenFlow13
          ovs-vsctl set-controller br-sdn tcp:127.0.0.1:6653

          refresh_table_miss() {
            ovs-ofctl -O OpenFlow13 add-flow br-sdn "priority=0,actions=CONTROLLER:65535" > /dev/null 2>&1 || true
          }

          refresh_gateway_flows() {
            # Let Ryu answer gateway ARP directly; sending these requests to
            # LOCAL can strand ARP replies if learned return flows were cleared.
            ovs-ofctl -O OpenFlow13 add-flow br-sdn "priority=200,arp,arp_tpa=10.0.0.1,actions=CONTROLLER:65535" > /dev/null 2>&1 || true
            # Keep local gateway/collector IP traffic available even while Ryu
            # is reconverging or busy processing Packet-In bursts.
            ovs-ofctl -O OpenFlow13 add-flow br-sdn "priority=200,ip,nw_dst=10.0.0.1,actions=LOCAL" > /dev/null 2>&1 || true
          }
          refresh_table_miss
          refresh_gateway_flows
          
          echo "Obteniendo IP del Redis Master vía Sentinel..."
          MY_IP=$(get_br0_ip)
          MASTER_IP=$(get_redis_master)
          if [ -n "$MASTER_IP" ] && redis-cli -h "$MASTER_IP" PING > /dev/null 2>&1; then
            redis-cli -h $MASTER_IP HSET topology:node_names $DPID $NODE_NAME || true
            redis-cli -h $MASTER_IP HSET topology:node_ips $DPID $MY_IP || true
            echo "Nodo registrado en Master $MASTER_IP: $NODE_NAME ($MY_IP)"
          else
            echo "Error: No se pudo obtener el Redis Master de Sentinel."
          fi

          echo "Evaluando mapa físico mediante LLDP Point-to-Point asíncrono..."
          mkdir -p /run/ryu-vx-stale
          mkdir -p /run/ryu-vx-peer

          probe_vxlan_peer() {
            remote_ip="$1"
            [ -n "$remote_ip" ] || return 0
            [ "$remote_ip" != "$MY_IP" ] || return 0

            safe_name=$(echo "$remote_ip" | tr '.' '_')
            fail_file="/run/ryu-vx-peer/${safe_name}.fails"
            success_file="/run/ryu-vx-peer/${safe_name}.success"
            state_key="vxlan:peer:state:${DPID}:${remote_ip}"

            if ping -c 1 -W 1 "$remote_ip" > /dev/null 2>&1; then
              successes=0
              [ -f "$success_file" ] && successes=$(cat "$success_file" 2>/dev/null || echo 0)
              successes=$((successes + 1))
              echo "$successes" > "$success_file"
              echo 0 > "$fail_file"
              if [ "$successes" -ge 2 ]; then
                redis-cli -h "$MASTER_IP" SET "$state_key" up EX 10 > /dev/null 2>&1 || true
              fi
            else
              failures=0
              [ -f "$fail_file" ] && failures=$(cat "$fail_file" 2>/dev/null || echo 0)
              failures=$((failures + 1))
              echo "$failures" > "$fail_file"
              echo 0 > "$success_file"
              if [ "$failures" -ge 3 ]; then
                redis-cli -h "$MASTER_IP" SET "$state_key" down EX 10 > /dev/null 2>&1 || true
              fi
            fi
          }

          while true; do
            refresh_gateway_flows

            # Identificar MgmtIP capturadas por LLDP en interfaces físicas puras (ej. lldp.ens4.chassis.mgmt-ip=192.168.122.101)
            MY_IP=$(get_br0_ip)
            if [ -z "$MY_IP" ]; then
              echo "br0 perdio IPv4 de gestion; pausando heartbeat SDN..."
              sleep 3
              continue
            fi

            MASTER_IP=$(get_redis_master)
            if [ -z "$MASTER_IP" ] || ! redis-cli -h "$MASTER_IP" PING > /dev/null 2>&1; then
              echo "Redis Master no alcanzable; pausando heartbeat SDN..."
              sleep 3
              continue
            fi

            # Arquitectura estricta: los túneles VXLAN representan enlaces SDN
            # entre vecinos físicos directos. No se crean sobre enlaces br0 que
            # STP mantiene bloqueados aunque la IP remota sea alcanzable por otro camino.
            LOCAL_FORWARDING_PEERS=""
            LLDP_KV=$(lldpcli show neighbors -f keyvalue 2>/dev/null || true)
            apply_dynamic_stp_costs "$LLDP_KV"
            for stp_intf in $(ls /sys/class/net/br0/brif 2>/dev/null || true); do
              STATE_NUM=$(cat /sys/class/net/br0/brif/$stp_intf/state 2>/dev/null || echo "")
              [ "$STATE_NUM" = "3" ] || continue
              remote_ip=$(printf '%s\n' "$LLDP_KV" | grep "^lldp.${stp_intf}.chassis.mgmt-ip=" | cut -d= -f2 | grep -E "^192\.168\." | head -n 1 || true)
              if [ -n "$remote_ip" ] && [ "$remote_ip" != "$MY_IP" ]; then
                LOCAL_FORWARDING_PEERS=$(printf '%s\n%s\n' "$LOCAL_FORWARDING_PEERS" "$remote_ip")
              fi
            done

            REDIS_LOCAL_FORWARDING_PEERS=""
            while read -r stp_key && read -r stp_status; do
              state=$(echo "$stp_status" | cut -d: -f1)
              remote_ip=$(echo "$stp_status" | cut -d: -f2-)

              if [ "$state" != "forwarding" ]; then
                continue
              fi

              if echo "$stp_key" | grep -q "^${DPID}:" && echo "$remote_ip" | grep -Eq "^192\.168\."; then
                REDIS_LOCAL_FORWARDING_PEERS=$(printf '%s\n%s\n' "$REDIS_LOCAL_FORWARDING_PEERS" "$remote_ip")
              fi
            done < <(redis-cli -h "$MASTER_IP" HGETALL topology:br0_stp_ports 2>/dev/null || true)
            CANDIDATE_VXLAN_PEERS=$(printf '%s\n%s\n' "$LOCAL_FORWARDING_PEERS" "$REDIS_LOCAL_FORWARDING_PEERS" | grep -E "^192\.168\." | sort -u || true)
            VXLAN_PEERS=""
            for candidate_ip in $CANDIDATE_VXLAN_PEERS; do
              remote_raw=$(redis-cli -h "$MASTER_IP" HGETALL topology:node_ips 2>/dev/null | awk -v ip="$candidate_ip" 'NR % 2 == 1 {key=$0; next} $0 == ip {print key; exit}')
              [ -n "$remote_raw" ] || continue
              remote_forwarding=$(redis-cli -h "$MASTER_IP" HGETALL topology:br0_stp_ports 2>/dev/null | awk -v prefix="${remote_raw}:" -v my_ip="$MY_IP" 'NR % 2 == 1 {key=$0; next} index(key, prefix) == 1 && $0 == "forwarding:" my_ip {print "yes"; exit}')
              if [ "$remote_forwarding" = "yes" ]; then
                VXLAN_PEERS=$(printf '%s\n%s\n' "$VXLAN_PEERS" "$candidate_ip")
              fi
            done
            VXLAN_PEERS=$(printf '%s\n' "$VXLAN_PEERS" | grep -E "^192\.168\." | sort -u || true)

            # Fallback: si el grafo de forwarding directo está particionado, permitir túneles
            # VXLAN vía Mgmt-STP-Switch para nodos que no tienen forwarding directo pero ambos
            # tienen forwarding hacia el switch de gestión.
            MY_HAS_MGMT_FORWARDING=$(redis-cli -h "$MASTER_IP" HGETALL topology:br0_stp_ports 2>/dev/null | awk -v prefix="${DPID}:" 'NR % 2 == 1 {key=$0; next} index(key, prefix) == 1 && $0 ~ /^forwarding:mgmt-switch/ {print "yes"; exit}')

            if [ "$MY_HAS_MGMT_FORWARDING" = "yes" ]; then
              ALL_K3S_IPS=$(redis-cli -h "$MASTER_IP" HVALS topology:node_ips 2>/dev/null | grep -E "^192\.168\." || true)
              for candidate_ip in $ALL_K3S_IPS; do
                [ "$candidate_ip" != "$MY_IP" ] || continue
                echo "$VXLAN_PEERS" | grep -qx "$candidate_ip" && continue

                remote_raw=$(redis-cli -h "$MASTER_IP" HGETALL topology:node_ips 2>/dev/null | awk -v ip="$candidate_ip" 'NR % 2 == 1 {key=$0; next} $0 == ip {print key; exit}')
                [ -n "$remote_raw" ] || continue

                remote_has_mgmt_forwarding=$(redis-cli -h "$MASTER_IP" HGETALL topology:br0_stp_ports 2>/dev/null | awk -v prefix="${remote_raw}:" 'NR % 2 == 1 {key=$0; next} index(key, prefix) == 1 && $0 ~ /^forwarding:mgmt-switch/ {print "yes"; exit}')

                if [ "$remote_has_mgmt_forwarding" = "yes" ]; then
                  echo "Fallback: $candidate_ip alcanzable via Mgmt-STP-Switch (sin forwarding directo)"
                  VXLAN_PEERS=$(printf '%s\n%s\n' "$VXLAN_PEERS" "$candidate_ip")
                fi
              done
              VXLAN_PEERS=$(printf '%s\n' "$VXLAN_PEERS" | grep -E "^192\.168\." | sort -u || true)
            fi

            for remote_ip in $VXLAN_PEERS; do
              # Validar IP
              if [ -z "$remote_ip" ] || [ "$remote_ip" = "$MY_IP" ]; then continue; fi

              # Nombre de puerto unico: vx + los 4 octetos sin puntos
              PORT_NAME="vx$(echo $remote_ip | tr -d '.')"
              
              # Crear el tunel VXLAN SDN hacia lo que físicamente existe
              if ! ovs-vsctl list-ports br-sdn | grep -q "^${PORT_NAME}$"; then
                echo "Auto-detectado vecino L2 físico: $remote_ip. Instanciando encapsulación SDN..."
                ovs-vsctl --may-exist add-port br-sdn $PORT_NAME \
                  -- set interface $PORT_NAME type=vxlan \
                     options:remote_ip=$remote_ip \
                     options:key=100 \
                     options:dst_port=4789 \
                  > /dev/null 2>&1 || true
                refresh_table_miss
                refresh_gateway_flows
              fi
              rm -f "/run/ryu-vx-stale/${PORT_NAME}" 2>/dev/null || true
            done

            for vx_port in $(ovs-vsctl list-ports br-sdn 2>/dev/null | grep "^vx" || true); do
              remote_ip=$(echo "$vx_port" | sed -E 's/^vx192168122([0-9]{1,3})$/192.168.122.\1/')
              if echo "$VXLAN_PEERS" | grep -qx "$remote_ip"; then
                rm -f "/run/ryu-vx-stale/${vx_port}" 2>/dev/null || true
                continue
              fi

              miss_file="/run/ryu-vx-stale/${vx_port}"
              misses=0
              [ -f "$miss_file" ] && misses=$(cat "$miss_file" 2>/dev/null || echo 0)
              misses=$((misses + 1))
              echo "$misses" > "$miss_file"
              if [ "$misses" -ge 4 ]; then
                echo "Vecino LLDP perdido: $remote_ip ($vx_port). Eliminando túnel VXLAN obsoleto..."
                OFPORT=$(ovs-vsctl get Interface "$vx_port" ofport 2>/dev/null || echo "")
                if echo "$OFPORT" | grep -Eq '^[0-9]+$'; then
                  ovs-ofctl -O OpenFlow13 del-flows br-sdn "out_port=$OFPORT" > /dev/null 2>&1 || true
                fi
                ovs-vsctl --if-exists del-port br-sdn "$vx_port" > /dev/null 2>&1 || true
                refresh_table_miss
                refresh_gateway_flows
                rm -f "$miss_file" 2>/dev/null || true
              fi
            done

            for vx_port in $(ovs-vsctl list-ports br-sdn 2>/dev/null | grep "^vx" || true); do
              remote_ip=$(echo "$vx_port" | sed -E 's/^vx192168122([0-9]{1,3})$/192.168.122.\1/')
              if echo "$remote_ip" | grep -Eq "^192\.168\."; then
                probe_vxlan_peer "$remote_ip"
              fi
            done

            # Añadir Guests en cualquier interfaz ensX que NO pertenezca a br0 (topología física)
            for intf in $(ls /sys/class/net | grep -E "^ens[4-9]$|^ens[1-9][0-9]$"); do
              if ip link show $intf | grep -q "master br0"; then continue; fi
              
              if ! ovs-vsctl list-ports br-sdn | grep -q "^$intf$"; then
                echo "Auto-detectado nuevo Guest en $intf. Añadiendo a la red SDN..."
                ip link set $intf up > /dev/null 2>&1 || true
                ovs-vsctl --may-exist add-port br-sdn $intf > /dev/null 2>&1 || true
              fi
            done

            # Persistir ubicación de guests conocidos usando la FDB local de OVS.
            # Esto reconstruye el mapa aunque Ryu haya reiniciado y todavía no haya recibido Packet-In.
            if [ -n "$MASTER_IP" ] && [ -n "$DPID" ]; then
              DPID_DEC=$((16#$DPID))
              KNOWN_GUESTS=$(redis-cli -h $MASTER_IP HKEYS topology:guest_ips 2>/dev/null || true)
              for intf in $(ovs-vsctl list-ports br-sdn 2>/dev/null | grep -E "^ens" || true); do
                OFPORT=$(ovs-vsctl get Interface "$intf" ofport 2>/dev/null || echo "")
                [ -z "$OFPORT" ] && continue
                for guest_mac in $(ovs-appctl fdb/show br-sdn 2>/dev/null | awk -v port="$OFPORT" '$1 == port {print $3}'); do
                  if echo "$KNOWN_GUESTS" | grep -qx "$guest_mac"; then
                    redis-cli -h $MASTER_IP HSET "mac_to_port:${DPID_DEC}" "$guest_mac" "$OFPORT" > /dev/null 2>&1 || true
                  fi
                done
              done
            fi

            # Heartbeat (Latido L2): Avisar al Controlador global que este nodo físico sigue vivo.
            if [ -n "$MASTER_IP" ] && [ -n "$DPID" ]; then
              redis-cli -h $MASTER_IP HSET topology:node_names $DPID $NODE_NAME > /dev/null 2>&1 || true
              redis-cli -h $MASTER_IP HSET topology:node_ips $DPID $MY_IP > /dev/null 2>&1 || true
              OLD_BR0_STP_KEYS=$(redis-cli -h $MASTER_IP HKEYS topology:br0_stp_ports 2>/dev/null | grep "^${DPID}:" || true)
              for stp_key in $OLD_BR0_STP_KEYS; do
                redis-cli -h $MASTER_IP HDEL topology:br0_stp_ports "$stp_key" > /dev/null 2>&1 || true
              done
              for stp_intf in $(ls /sys/class/net/br0/brif 2>/dev/null || true); do
                STATE_NUM=$(cat /sys/class/net/br0/brif/$stp_intf/state 2>/dev/null || echo "")
                case "$STATE_NUM" in
                  0) STP_STATE="disabled" ;;
                  1) STP_STATE="listening" ;;
                  2) STP_STATE="learning" ;;
                  3) STP_STATE="forwarding" ;;
                  4) STP_STATE="blocking" ;;
                  *) STP_STATE="unknown" ;;
                esac
                LLDP_KV=$(lldpcli show neighbors -f keyvalue 2>/dev/null || true)
                REMOTE_IP=$(printf '%s\n' "$LLDP_KV" | grep "^lldp.${stp_intf}.chassis.mgmt-ip=" | cut -d= -f2 | grep -E "^192\.168\." | head -n 1 || true)
                if [ -z "$REMOTE_IP" ]; then
                  REMOTE_NAME=$(printf '%s\n' "$LLDP_KV" | grep "^lldp.${stp_intf}.chassis.name=" | cut -d= -f2 | head -n 1 || true)
                  if [ "$REMOTE_NAME" = "Mgmt-STP-Switch" ]; then
                    REMOTE_IP="mgmt-switch"
                  elif [ "$STP_STATE" = "forwarding" ] && is_root_port "$stp_intf"; then
                    REMOTE_IP="mgmt-switch"
                  elif [ "$STP_STATE" != "disabled" ]; then
                    # Some simple L2 switches do not advertise LLDP. If a br0
                    # port participates in STP but has no LLDP neighbor, expose
                    # it as the management/STP switch so blocked backup links are visible.
                    REMOTE_IP="mgmt-switch"
                  fi
                fi
                if [ -n "$REMOTE_IP" ]; then
                  redis-cli -h $MASTER_IP HSET topology:br0_stp_ports "$DPID:$stp_intf" "$STP_STATE:$REMOTE_IP" > /dev/null 2>&1 || true
                fi
              done
              redis-cli -h $MASTER_IP HSET topology:node_last_seen $DPID "$(date +%s)" > /dev/null 2>&1 || true
              redis-cli -h $MASTER_IP SET "switch:alive:$DPID" "1" EX 30 > /dev/null 2>&1 || true
            fi
            sleep 2
          done
        volumeMounts:
        - name: libmodules
          mountPath: /lib/modules
          readOnly: true
        - name: run-openvswitch
          mountPath: /var/run/openvswitch
        readinessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - |
              test -e /sys/class/net/br0 &&
              test -e /sys/class/net/br-sdn &&
              ovs-vsctl br-exists br-sdn &&
              ovs-vsctl get-controller br-sdn | grep -q "tcp:127.0.0.1:6653"
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        startupProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - |
              test -e /sys/class/net/br0 &&
              ovs-vsctl br-exists br-sdn
          periodSeconds: 5
          failureThreshold: 90
        livenessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - |
              test -e /sys/class/net/br0 &&
              ovs-vsctl br-exists br-sdn
          periodSeconds: 20
          failureThreshold: 6
      volumes:
      - name: libmodules
        hostPath:
          path: /lib/modules
      - name: run-openvswitch
        hostPath:
          path: /var/run/openvswitch
          type: DirectoryOrCreate
---
# ==========================
# Servidor DHCP Distribuido sobre Red VXLAN L2 
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sdn-dhcp-server
  namespace: sdn-controller
  labels:
    app: sdn-dhcp
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
  selector:
    matchLabels:
      app: sdn-dhcp
  template:
    metadata:
      labels:
        app: sdn-dhcp
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: dhcp
        image: arturoalvarez/ryu-dhcp:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        env:
        - name: REDIS_SENTINEL_HOST
          value: "redis-sentinel.sdn-controller.svc.cluster.local"
        - name: REDIS_SENTINEL_PORT
          value: "26379"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -e /sys/class/net/br-sdn
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
        startupProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -e /sys/class/net/br-sdn
          periodSeconds: 5
          failureThreshold: 90
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -e /sys/class/net/br-sdn
          periodSeconds: 20
          failureThreshold: 6
      volumes:
      - name: code-volume
        configMap:
          name: dhcp-code
