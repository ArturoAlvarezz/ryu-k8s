# Plano SDN del host: OVS/VXLAN y DHCP distribuido. Sin STP.
# Los túneles VXLAN se crean a TODOS los nodos conocidos (full mesh).
# STP se elimina: los loops se previenen vía MST calculado por Ryu.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ovs-sdn-initializer
  namespace: sdn-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ovs-sdn-initializer-node-reader
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ovs-sdn-initializer-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ovs-sdn-initializer-node-reader
subjects:
- kind: ServiceAccount
  name: ovs-sdn-initializer
  namespace: sdn-controller
---
# ==========================
# Auto-Configurador de OVS Host (DaemonSet) - Compatible Kernel Host
# Sin STP: loops prevenidos por MST en Ryu
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ovs-sdn-initializer
  namespace: sdn-controller
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
  selector:
    matchLabels:
      app: ovs-init
  template:
    metadata:
      labels:
        app: ovs-init
    spec:
      serviceAccountName: ovs-sdn-initializer
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      dnsConfig:
        nameservers:
        - 10.43.0.10
        options:
        - name: ndots
          value: "2"
      containers:
      - name: ovs-configurator
        image: arturoalvarez/ovs-sdn-initializer:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command:
        - /bin/bash
        - -c
        - |
          get_br0_ip() {
            ip -4 addr show br0 2>/dev/null | awk '/inet / {print $2}' | cut -d/ -f1 | head -1
          }

          wait_for_management_plane() {
            while true; do
              MY_IP=$(get_br0_ip)
              if [ -z "$MY_IP" ]; then
                echo "br0 aun no tiene IPv4 de gestion; esperando..."
                sleep 3
                continue
              fi

              if ! ip link show br0 2>/dev/null | grep -q "state UP"; then
                echo "br0 existe pero no esta UP; intentando levantarlo..."
                ip link set br0 up 2>/dev/null || true
                sleep 3
                continue
              fi

              if ! redis-cli -h redis-sentinel.sdn-controller.svc.cluster.local -p 26379 PING > /dev/null 2>&1; then
                echo "Redis Sentinel aun no esta alcanzable desde $MY_IP; esperando..."
                sleep 3
                continue
              fi

              echo "Plano de gestion listo en $MY_IP."
              return 0
            done
          }

          get_redis_master() {
            redis-cli -h redis-sentinel.sdn-controller.svc.cluster.local -p 26379 sentinel get-master-addr-by-name mymaster 2>/dev/null | head -n 1
          }

          node_role() {
            role=""
            token_file=/var/run/secrets/kubernetes.io/serviceaccount/token
            ca_file=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            if command -v curl >/dev/null 2>&1 && [ -r "$token_file" ] && [ -r "$ca_file" ] && [ -n "${KUBERNETES_SERVICE_HOST:-}" ]; then
              token=$(cat "$token_file" 2>/dev/null || true)
              labels=$(curl -fsS --connect-timeout 1 --max-time 2 --cacert "$ca_file" \
                -H "Authorization: Bearer $token" \
                "https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}/api/v1/nodes/${NODE_NAME}" 2>/dev/null \
                | jq -r '.metadata.labels | keys[]?' 2>/dev/null || true)
              if printf '%s\n' "$labels" | grep -q '^node-role.kubernetes.io/control-plane$\|^node-role.kubernetes.io/master$'; then
                role="control-plane"
              fi
            fi
            if [ -z "$role" ]; then
              case "$NODE_NAME" in
                master|master-*|control-*|controlplane-*|control-plane-*) role="control-plane" ;;
                *) role="worker" ;;
              esac
            fi
            printf '%s' "$role"
          }

          measure_link_cost() {
            remote_ip="$1"
            RTT=$(ping -c 3 -W 1 "$remote_ip" 2>/dev/null | awk '/rtt|min/ {print $4}' | cut -d/ -f1 || echo "")
            if [ -n "$RTT" ]; then
              echo "$RTT"
            else
              echo "1.0"
            fi
          }

          wait_for_management_plane

          echo "Cargando módulo del kernel..."
          modprobe openvswitch || true

          echo "Iniciando servicio OVS y LLDPD..."
          service openvswitch-switch start
          mkdir -p /run/lldpd
          lldpd -d &
          sleep 2

          BR0_MAC=$(ip link show br0 | awk '/ether/ {print $2}')
          MAC_ADDR=$(echo "$BR0_MAC" | tr -d ':')
          DPID="0000${MAC_ADDR}"

          if ovs-vsctl br-exists br-sdn; then
            CURRENT_DPID=$(ovs-vsctl get bridge br-sdn other-config:datapath-id 2>/dev/null | tr -d '"' || true)
            if [ "$CURRENT_DPID" != "$DPID" ]; then
              echo "br-sdn tiene DPID inesperado ($CURRENT_DPID != $DPID). Reconstruyendo bridge..."
              ovs-vsctl --if-exists del-br br-sdn
            else
              echo "br-sdn existente valido. Reutilizando bridge para acelerar restauracion."
            fi
          fi

          echo "Asegurando br-sdn con DPID fisico estatico: $DPID..."
          ovs-vsctl --may-exist add-br br-sdn
          ovs-vsctl set bridge br-sdn other-config:datapath-id=$DPID
          ovs-vsctl set bridge br-sdn other-config:hwaddr=$BR0_MAC
          ip link set br-sdn address $BR0_MAC
          ip link set br-sdn up

          echo "Asignando gateway/collector SDN local 10.0.0.1/24 al br-sdn..."
          ip addr show br-sdn | grep -q "10.0.0.1/24" || ip addr add 10.0.0.1/24 dev br-sdn || true

          echo "Conectando al controlador Ryu..."
          ovs-vsctl set bridge br-sdn protocols=OpenFlow13
          ovs-vsctl set-controller br-sdn tcp:127.0.0.1:6653

          refresh_table_miss() {
            ovs-ofctl -O OpenFlow13 add-flow br-sdn "priority=0,actions=CONTROLLER:65535" > /dev/null 2>&1 || true
          }

          refresh_gateway_flows() {
            ovs-ofctl -O OpenFlow13 add-flow br-sdn "priority=200,arp,arp_tpa=10.0.0.1,actions=CONTROLLER:65535" > /dev/null 2>&1 || true
            ovs-ofctl -O OpenFlow13 add-flow br-sdn "priority=200,ip,nw_dst=10.0.0.1,actions=LOCAL" > /dev/null 2>&1 || true
          }
          refresh_table_miss
          refresh_gateway_flows

          echo "Obteniendo IP del Redis Master via Sentinel..."
          MY_IP=$(get_br0_ip)
          MASTER_IP=$(get_redis_master)
          if [ -n "$MASTER_IP" ] && redis-cli -h $MASTER_IP PING > /dev/null 2>&1; then
            redis-cli -h $MASTER_IP HSET topology:node_names $DPID $NODE_NAME || true
            redis-cli -h $MASTER_IP HSET topology:node_ips $DPID $MY_IP || true
            echo "Nodo registrado en Master $MASTER_IP: $NODE_NAME ($MY_IP)"
          else
            echo "Error: No se pudo obtener el Redis Master de Sentinel."
          fi

          echo "Evaluando mapa fisico mediante LLDP..."
          mkdir -p /run/ryu-vx-stale

          COST_INTERVAL_FILE="/run/ryu-link-cost-interval"
          COST_INTERVAL=${COST_INTERVAL:-30}

          while true; do
            refresh_gateway_flows

            MY_IP=$(get_br0_ip)
            if [ -z "$MY_IP" ]; then
              echo "br0 perdio IPv4 de gestion; pausando heartbeat SDN..."
              sleep 3
              continue
            fi

            MASTER_IP=$(get_redis_master)
            if [ -z "$MASTER_IP" ] || ! redis-cli -h "$MASTER_IP" PING > /dev/null 2>&1; then
              echo "Redis Master no alcanzable; pausando heartbeat SDN..."
              sleep 3
              continue
            fi

            # Neighbor-only VXLAN topology: solo a vecinos LLDP directos, no full mesh.
            # Ver AGENTS.md "VXLAN topology is neighbor-only (LLDP), NOT full mesh."
            # Lee topology:links (SET) escrito por Ryu link_add_handler.
            # Cada link tiene formato "<src_dpid>:<src_port>-<dst_dpid>:<dst_port>".
            # Filtra los links donde aparece este nodo, traduce el peer DPID a IP via topology:node_ips.
            ALL_LINKS=$(redis-cli -h "$MASTER_IP" SMEMBERS topology:links 2>/dev/null || true)
            DPID_DEC=$((16#$DPID))
            VXLAN_PEERS=""
            for link in $ALL_LINKS; do
              case "$link" in
                *"-") continue ;;  # skip malformed
              esac
              src_field="${link%%-*}"
              dst_field="${link#*-}"
              src_dpid_str="${src_field%%:*}"
              dst_dpid_str="${dst_field%%:*}"
              # Si este nodo es uno de los dos extremos, el otro es vecino
              if [ "$src_dpid_str" = "$DPID_DEC" ]; then
                peer_dpid="$dst_dpid_str"
              elif [ "$dst_dpid_str" = "$DPID_DEC" ]; then
                peer_dpid="$src_dpid_str"
              else
                continue
              fi
              # Traduce peer_dpid (decimal) a raw hex para buscar en topology:node_ips
              peer_raw=$(printf '%016x' "$peer_dpid")
              peer_ip=$(redis-cli -h "$MASTER_IP" HGET topology:node_ips "$peer_raw" 2>/dev/null || true)
              case "$peer_ip" in
                192.168.*) ;;  # only IPv4 192.168.0.0/16
                *) continue ;;
              esac
              [ "$peer_ip" != "$MY_IP" ] || continue
              VXLAN_PEERS=$(printf '%s\n%s\n' "$VXLAN_PEERS" "$peer_ip")
            done
            VXLAN_PEERS=$(printf '%s\n' "$VXLAN_PEERS" | grep -E "^192\.168\." | sort -u || true)

            for remote_ip in $VXLAN_PEERS; do
              PORT_NAME="vx$(echo $remote_ip | tr -d '.')"
              if ! ovs-vsctl list-ports br-sdn | grep -q "^${PORT_NAME}$"; then
                echo "Creando tunel VXLAN a $remote_ip..."
                ovs-vsctl --may-exist add-port br-sdn $PORT_NAME \
                  -- set interface $PORT_NAME type=vxlan \
                     options:remote_ip=$remote_ip \
                     options:key=100 \
                     options:dst_port=4789 \
                  > /dev/null 2>&1 || true
                refresh_table_miss
                refresh_gateway_flows
              fi
              rm -f "/run/ryu-vx-stale/${PORT_NAME}" 2>/dev/null || true
            done

            # Eliminar túneles a IPs que ya no existen en Redis
            for vx_port in $(ovs-vsctl list-ports br-sdn 2>/dev/null | grep "^vx" || true); do
              remote_ip=$(echo "$vx_port" | sed -E 's/^vx192168122([0-9]{1,3})$/192.168.122.\1/')
              if echo "$VXLAN_PEERS" | grep -qx "$remote_ip"; then
                rm -f "/run/ryu-vx-stale/${vx_port}" 2>/dev/null || true
                continue
              fi

              miss_file="/run/ryu-vx-stale/${vx_port}"
              misses=0
              [ -f "$miss_file" ] && misses=$(cat "$miss_file" 2>/dev/null || echo 0)
              misses=$((misses + 1))
              echo "$misses" > "$miss_file"
              if [ "$misses" -ge 4 ]; then
                if [ -z "$MASTER_IP" ] || ! redis-cli -h "$MASTER_IP" PING > /dev/null 2>&1; then
                  echo "Redis no disponible; preservando tunel $remote_ip"
                  continue
                fi
                echo "Nodo $remote_ip ya no esta en Redis. Eliminando tunel $vx_port..."
                OFPORT=$(ovs-vsctl get Interface "$vx_port" ofport 2>/dev/null || echo "")
                if echo "$OFPORT" | grep -Eq '^[0-9]+$'; then
                  ovs-ofctl -O OpenFlow13 del-flows br-sdn "out_port=$OFPORT" > /dev/null 2>&1 || true
                fi
                ovs-vsctl --if-exists del-port br-sdn "$vx_port" > /dev/null 2>&1 || true
                refresh_table_miss
                refresh_gateway_flows
                rm -f "$miss_file" 2>/dev/null || true
              fi
            done

            # Medicion de costos de enlace (RTT via ping)
            last_cost_time=0
            [ -f "$COST_INTERVAL_FILE" ] && last_cost_time=$(cat "$COST_INTERVAL_FILE" 2>/dev/null || echo 0)
            now=$(date +%s)
            if [ $((now - last_cost_time)) -ge $COST_INTERVAL ]; then
              for remote_ip in $VXLAN_PEERS; do
                cost=$(measure_link_cost "$remote_ip")
                edge_key=$(printf '%s\n%s\n' "$DPID:$remote_ip" "$remote_ip:$DPID" | sort | head -n 1 | tr -d ':')
                redis-cli -h "$MASTER_IP" HSET "topology:link_cost" "$edge_key" "$cost" > /dev/null 2>&1 || true
              done
              echo "$now" > "$COST_INTERVAL_FILE"
            fi

            # Añadir Guests en cualquier interfaz ensX que NO pertenezca a br0
            for intf in $(ls /sys/class/net | grep -E "^ens[4-9]$|^ens[1-9][0-9]$"); do
              if ip link show $intf | grep -q "master br0"; then continue; fi

              if ! ovs-vsctl list-ports br-sdn | grep -q "^$intf$"; then
                echo "Auto-detectado nuevo Guest en $intf. Añadiendo a la red SDN..."
                ip link set $intf up > /dev/null 2>&1 || true
                ovs-vsctl --may-exist add-port br-sdn $intf > /dev/null 2>&1 || true
              fi
            done

            # Persistir ubicacion de guests conocidos usando la FDB local de OVS
            if [ -n "$MASTER_IP" ] && [ -n "$DPID" ]; then
              DPID_DEC=$((16#$DPID))
              KNOWN_GUESTS=$(redis-cli -h $MASTER_IP HKEYS topology:guest_ips 2>/dev/null || true)
              for intf in $(ovs-vsctl list-ports br-sdn 2>/dev/null | grep -E "^ens" || true); do
                OFPORT=$(ovs-vsctl get Interface "$intf" ofport 2>/dev/null || echo "")
                [ -z "$OFPORT" ] && continue
                for guest_mac in $(ovs-appctl fdb/show br-sdn 2>/dev/null | awk -v port="$OFPORT" '$1 == port {print $3}'); do
                  if echo "$KNOWN_GUESTS" | grep -qx "$guest_mac"; then
                    redis-cli -h $MASTER_IP HSET "mac_to_port:${DPID_DEC}" "$guest_mac" "$OFPORT" > /dev/null 2>&1 || true
                  fi
                done
              done
            fi

            # Heartbeat: registrar nodo vivo en Redis
            if [ -n "$MASTER_IP" ] && [ -n "$DPID" ]; then
              redis-cli -h $MASTER_IP HSET topology:node_names $DPID $NODE_NAME > /dev/null 2>&1 || true
              redis-cli -h $MASTER_IP HSET topology:node_ips $DPID $MY_IP > /dev/null 2>&1 || true
              redis-cli -h $MASTER_IP HSET topology:node_last_seen $DPID "$(date +%s)" > /dev/null 2>&1 || true
              redis-cli -h $MASTER_IP SET "switch:alive:$DPID" "1" EX 30 > /dev/null 2>&1 || true
            fi
            sleep 2
          done
        volumeMounts:
        - name: libmodules
          mountPath: /lib/modules
          readOnly: true
        - name: run-openvswitch
          mountPath: /var/run/openvswitch
        readinessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - |
              test -e /sys/class/net/br0 &&
              test -e /sys/class/net/br-sdn &&
              ovs-vsctl br-exists br-sdn &&
              ovs-vsctl get-controller br-sdn | grep -q "tcp:127.0.0.1:6653"
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        startupProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - |
              test -e /sys/class/net/br0 &&
              ovs-vsctl br-exists br-sdn
          periodSeconds: 5
          failureThreshold: 90
        livenessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - |
              test -e /sys/class/net/br0 &&
              ovs-vsctl br-exists br-sdn
          periodSeconds: 20
          failureThreshold: 6
      volumes:
      - name: libmodules
        hostPath:
          path: /lib/modules
      - name: run-openvswitch
        hostPath:
          path: /var/run/openvswitch
          type: DirectoryOrCreate
---
# ==========================
# Servidor DHCP Distribuido sobre Red VXLAN L2
# ==========================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sdn-dhcp-server
  namespace: sdn-controller
  labels:
    app: sdn-dhcp
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
  selector:
    matchLabels:
      app: sdn-dhcp
  template:
    metadata:
      labels:
        app: sdn-dhcp
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: dhcp
        image: arturoalvarez/ryu-dhcp:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        env:
        - name: REDIS_SENTINEL_HOST
          value: "redis-sentinel.sdn-controller.svc.cluster.local"
        - name: REDIS_SENTINEL_PORT
          value: "26379"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: code-volume
          mountPath: /app/app.py
          subPath: app.py
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -e /sys/class/net/br-sdn
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
        startupProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -e /sys/class/net/br-sdn
          periodSeconds: 5
          failureThreshold: 90
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -e /sys/class/net/br-sdn
          periodSeconds: 20
          failureThreshold: 6
      volumes:
      - name: code-volume
        configMap:
          name: dhcp-code