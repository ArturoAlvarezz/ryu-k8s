# Observabilidad: Prometheus, Grafana, Loki, Promtail y Node Exporter.
---
# ==========================
# Observabilidad: Prometheus + Grafana + Node Exporter
# ==========================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: sdn-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sdn-prometheus
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sdn-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sdn-prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: sdn-controller
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sdn-controller
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
    - job_name: prometheus
      static_configs:
      - targets:
        - localhost:9090

    - job_name: ryu
      scrape_interval: 10s
      scrape_timeout: 9s
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - sdn-controller
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: ryu
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: ([^:]+);(\d+)
        replacement: ${1}:${2}
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

    - job_name: meter-collector
      scrape_interval: 10s
      scrape_timeout: 9s
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - sdn-controller
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: meter-collector
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: ([^:]+);(\d+)
        replacement: ${1}:${2}
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

    - job_name: node-exporter
      kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
          - sdn-controller
      relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app]
        action: keep
        regex: node-exporter
      - source_labels: [__meta_kubernetes_endpoint_node_name]
        target_label: node
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: sdn-controller
  labels:
    app: prometheus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: prometheus
              topologyKey: kubernetes.io/hostname
      containers:
      - name: prometheus
        image: prom/prometheus:v2.53.3
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --storage.tsdb.retention.time=6h
        - --web.enable-lifecycle
        ports:
        - containerPort: 9090
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 20
          periodSeconds: 30
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sdn-controller
  labels:
    app: prometheus
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 9090
    targetPort: 9090
  selector:
    app: prometheus
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: sdn-controller
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
      - operator: Exists
      containers:
      - name: node-exporter
        image: quay.io/prometheus/node-exporter:v1.8.2
        args:
        - --path.procfs=/host/proc
        - --path.sysfs=/host/sys
        - --path.rootfs=/host/root
        - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
        ports:
        - containerPort: 9100
          name: metrics
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: root
          mountPath: /host/root
          readOnly: true
      volumes:
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys
      - name: root
        hostPath:
          path: /
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: sdn-controller
  labels:
    app: node-exporter
spec:
  clusterIP: None
  ports:
  - name: metrics
    port: 9100
    targetPort: 9100
  selector:
    app: node-exporter
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: sdn-controller
data:
  loki.yml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
      - from: 2020-10-24
        store: boltdb-shipper
        object_store: filesystem
        schema: v11
        index:
          prefix: index_
          period: 24h
    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 24h
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: sdn-controller
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: loki
              topologyKey: kubernetes.io/hostname
      containers:
      - name: loki
        image: grafana/loki:2.9.8
        args:
        - -config.file=/etc/loki/loki.yml
        ports:
        - containerPort: 3100
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        - name: data
          mountPath: /loki
        readinessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: config
        configMap:
          name: loki-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: sdn-controller
  labels:
    app: loki
spec:
  ports:
  - name: http
    port: 3100
    targetPort: 3100
  selector:
    app: loki
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: sdn-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sdn-promtail
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods", "namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sdn-promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sdn-promtail
subjects:
- kind: ServiceAccount
  name: promtail
  namespace: sdn-controller
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: sdn-controller
data:
  promtail.yml: |
    server:
      http_listen_port: 3101
    positions:
      filename: /run/promtail/positions.yaml
    clients:
    - url: http://loki.sdn-controller.svc.cluster.local:3100/loki/api/v1/push
    scrape_configs:
    - job_name: ryu-container-logs
      static_configs:
      - targets:
        - localhost
        labels:
          namespace: sdn-controller
          app: ryu
          __path__: /var/log/containers/ryu-*_sdn-controller_ryu-*.log
      pipeline_stages:
      - cri: {}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: sdn-controller
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
      - operator: Exists
      containers:
      - name: promtail
        image: grafana/promtail:2.9.8
        args:
        - -config.file=/etc/promtail/promtail.yml
        ports:
        - containerPort: 3101
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: positions
          mountPath: /run/promtail
        - name: pods
          mountPath: /var/log/pods
          readOnly: true
        - name: containers
          mountPath: /var/log/containers
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: positions
        emptyDir: {}
      - name: pods
        hostPath:
          path: /var/log/pods
      - name: containers
        hostPath:
          path: /var/log/containers
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: sdn-controller
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      access: proxy
      url: http://prometheus.sdn-controller.svc.cluster.local:9090
      isDefault: true
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki.sdn-controller.svc.cluster.local:3100
  dashboards.yml: |
    apiVersion: 1
    providers:
    - name: SDN
      orgId: 1
      folder: SDN
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: sdn-controller
data:
  sdn-observability.json: |
    {
      "uid": "sdn-observability",
      "title": "SDN Observabilidad",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "timezone": "browser",
      "templating": {
        "list": [
          {
            "name": "src_guest",
            "label": "Guest origen",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "query_result(max by (id) (last_over_time(ryu_topology_node_info{type=\"guest\"}[30s])))",
            "regex": "/id=\"([^\"]+)\"/",
            "refresh": 1,
            "sort": 1,
            "includeAll": false,
            "multi": false
          },
          {
            "name": "dst_guest",
            "label": "Guest destino",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "query_result(max by (id) (last_over_time(ryu_topology_node_info{type=\"guest\",id!=\"$src_guest\"}[30s])))",
            "regex": "/id=\"([^\"]+)\"/",
            "refresh": 1,
            "sort": 1,
            "includeAll": false,
            "multi": false
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "type": "nodeGraph",
          "title": "Mapa SDN y camino entre guests",
          "gridPos": {"x": 0, "y": 0, "w": 24, "h": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "nodes",
              "expr": "topk by (id) (1, last_over_time(ryu_topology_node_info[30s]))",
              "format": "table",
              "instant": true
            },
            {
              "refId": "edges",
              "expr": "topk by (link) (1, ((last_over_time(ryu_topology_edge_info{link!=\"\"}[30s]) unless on (link) last_over_time(ryu_trace_path_edge_info{src_guest=\"$src_guest\",dst_guest=\"$dst_guest\",link!=\"\"}[30s])) or last_over_time(ryu_trace_path_edge_info{src_guest=\"$src_guest\",dst_guest=\"$dst_guest\",link!=\"\"}[30s])))",
              "format": "table",
              "instant": true
            }
          ],
          "options": {
            "layout": "grid",
            "zoomMode": "greedy",
            "nodes": {
              "mainStatUnit": "short",
              "secondaryStatUnit": "short"
            },
            "edges": {
              "mainStatUnit": "short",
              "secondaryStatUnit": "short"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Packet-In por segundo",
          "gridPos": {"x": 0, "y": 18, "w": 12, "h": 8},
          "targets": [{"expr": "sum by (dpid) (rate(ryu_packet_in_total[1m]))", "legendFormat": "switch {{dpid}}"}]
        },
        {
          "type": "stat",
          "title": "Nodos activos",
          "gridPos": {"x": 12, "y": 18, "w": 6, "h": 4},
          "targets": [{"expr": "max(ryu_active_nodes)", "legendFormat": "nodos"}]
        },
        {
          "type": "stat",
          "title": "Switches activos",
          "gridPos": {"x": 18, "y": 18, "w": 6, "h": 4},
          "targets": [{"expr": "max(ryu_active_switches)", "legendFormat": "switches"}]
        },
        {
          "type": "bargauge",
          "title": "Flujos instalados por switch",
          "gridPos": {"x": 12, "y": 22, "w": 12, "h": 4},
          "targets": [{"expr": "max by (dpid) (ryu_installed_flows)", "legendFormat": "{{dpid}}", "instant": true}]
        },
        {
          "type": "timeseries",
          "title": "Trafico por nodo (MB/s)",
          "gridPos": {"x": 0, "y": 26, "w": 12, "h": 8},
          "fieldConfig": {
            "defaults": {
              "unit": "MBs",
              "decimals": 2,
              "min": 0
            },
            "overrides": []
          },
          "targets": [{"expr": "sum by (node) (rate(node_network_receive_bytes_total{device!~\"lo|cni.*|flannel.*|veth.*\"}[1m]) + rate(node_network_transmit_bytes_total{device!~\"lo|cni.*|flannel.*|veth.*\"}[1m])) / 1024 / 1024", "legendFormat": "{{node}}"}]
        },
        {
          "type": "timeseries",
          "title": "CPU por nodo",
          "gridPos": {"x": 12, "y": 26, "w": 12, "h": 8},
          "targets": [{"expr": "100 - (avg by (node) (rate(node_cpu_seconds_total{mode=\"idle\"}[1m])) * 100)", "legendFormat": "{{node}}"}]
        },
        {
          "type": "timeseries",
          "title": "Memoria usada por nodo",
          "gridPos": {"x": 0, "y": 34, "w": 12, "h": 8},
          "targets": [{"expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100", "legendFormat": "{{node}}"}]
        },
        {
          "type": "timeseries",
          "title": "Trafico SDN por puerto OpenFlow (MB/s)",
          "gridPos": {"x": 12, "y": 34, "w": 12, "h": 8},
          "fieldConfig": {
            "defaults": {
              "unit": "MBs",
              "decimals": 2,
              "min": 0
            },
            "overrides": []
          },
          "targets": [{"expr": "sum by (dpid, port_name) (rate(ryu_port_rx_bytes_total[1m]) + rate(ryu_port_tx_bytes_total[1m])) / 1024 / 1024", "legendFormat": "{{dpid}} {{port_name}}"}]
        },
        {
          "type": "logs",
          "title": "Logs Ryu",
          "gridPos": {"x": 0, "y": 42, "w": 24, "h": 10},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"sdn-controller\", app=\"ryu\"}",
              "queryType": "range"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        },
        {
          "type": "timeseries",
          "title": "Eventos de Seguridad (por tipo)",
          "gridPos": {"x": 0, "y": 52, "w": 18, "h": 8},
          "targets": [{"expr": "sum by (type) (rate(ryu_security_events_by_type[1m]))", "legendFormat": "{{type}}"}]
        },
        {
          "type": "stat",
          "title": "Ataques Totales",
          "gridPos": {"x": 18, "y": 52, "w": 6, "h": 8},
          "targets": [{"expr": "max(ryu_security_events_total)", "legendFormat": "Eventos detectados"}]
        },
        {
          "type": "timeseries",
          "title": "Telemetria AMI rechazada por HMAC/replay",
          "gridPos": {"x": 0, "y": 60, "w": 18, "h": 8},
          "targets": [{"expr": "max by (reason) (rate(meter_hmac_invalid_by_reason_total{job=\"meter-collector\"}[1m]))", "legendFormat": "{{reason}}"}]
        },
        {
          "type": "stat",
          "title": "Paquetes AMI validos",
          "gridPos": {"x": 18, "y": 60, "w": 6, "h": 4},
          "targets": [{"expr": "max(meter_hmac_accepted_total{job=\"meter-collector\"})", "legendFormat": "aceptados"}]
        },
        {
          "type": "stat",
          "title": "Paquetes AMI invalidos",
          "gridPos": {"x": 18, "y": 64, "w": 6, "h": 4},
          "targets": [{"expr": "max(meter_hmac_invalid_total{job=\"meter-collector\"})", "legendFormat": "rechazados"}]
        },
        {
          "type": "timeseries",
          "title": "Potencia por Smart Meter",
          "gridPos": {"x": 0, "y": 68, "w": 18, "h": 8},
          "targets": [{"expr": "max by (device_id, source_ip) (meter_latest_power_kw{job=\"meter-collector\"})", "legendFormat": "{{device_id}} {{source_ip}}"}]
        },
        {
          "type": "stat",
          "title": "Smart Meters con telemetria",
          "gridPos": {"x": 18, "y": 68, "w": 6, "h": 8},
          "targets": [{"expr": "count(count by (device_id) (meter_latest_info{job=\"meter-collector\"}))", "legendFormat": "meters"}]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sdn-controller
  labels:
    app: grafana
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: grafana
              topologyKey: kubernetes.io/hostname
      containers:
      - name: grafana
        image: grafana/grafana:11.1.4
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: Admin
        - name: GF_SERVER_ROOT_URL
          value: http://192.168.122.10:3000/
        - name: GF_ANALYTICS_CHECK_FOR_UPDATES
          value: "false"
        - name: GF_ANALYTICS_REPORTING_ENABLED
          value: "false"
        - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
          value: /var/lib/grafana/dashboards/sdn-observability.json
        volumeMounts:
        - name: provisioning
          mountPath: /etc/grafana/provisioning/datasources/datasource.yml
          subPath: datasource.yml
        - name: provisioning
          mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
          subPath: dashboards.yml
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          timeoutSeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 30
      volumes:
      - name: provisioning
        configMap:
          name: grafana-provisioning
      - name: dashboards
        configMap:
          name: grafana-dashboards
---
