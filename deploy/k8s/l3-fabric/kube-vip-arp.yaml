# kube-vip en modo ARP — VIP de acceso EXTERNO compartido por los 3 control-planes.
#
# En el fabric L3, las loopbacks (10.255.x) y el VIP anycast del API (10.255.255.1)
# NO son alcanzables desde fuera (el host del usuario está en 192.168.122.0/24, el
# segmento L2 del Mgmt-Switch). Los 3 control-planes SÍ están en ese L2 (ens3 con
# 192.168.122.100/106/130). kube-vip ARP flota 192.168.122.10 entre ellos por
# elección de líder → punto de acceso ESTABLE y con failover a la API y a las webs
# (NodePort) — igual que la arquitectura antigua. Reemplaza la dependencia de la IP
# de master.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-vip
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:kube-vip-role
rules:
- apiGroups: [""]
  resources: ["services","services/status","nodes","endpoints"]
  verbs: ["list","get","watch","update"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["list","get","watch","update","create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:kube-vip-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kube-vip-role
subjects:
- kind: ServiceAccount
  name: kube-vip
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: kube-vip
  template:
    metadata:
      labels:
        app: kube-vip
    spec:
      serviceAccountName: kube-vip
      hostNetwork: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
      - effect: NoSchedule
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
      containers:
      - name: kube-vip
        image: ghcr.io/kube-vip/kube-vip:v0.8.0
        args: ["manager"]
        securityContext:
          capabilities:
            add: ["NET_ADMIN","NET_RAW"]
        env:
        - name: vip_arp
          value: "true"
        - name: address
          value: "192.168.122.10"
        - name: vip_interface
          value: "ens3"
        - name: vip_cidr
          value: "32"
        - name: port
          value: "6443"
        - name: cp_enable
          value: "true"
        - name: cp_namespace
          value: "kube-system"
        - name: svc_enable
          value: "false"
        - name: vip_leaderelection
          value: "true"
        - name: vip_leaseduration
          value: "5"
        - name: vip_renewdeadline
          value: "3"
        - name: vip_retryperiod
          value: "1"
